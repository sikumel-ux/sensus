<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sensus Pendataan RT 04</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#FF6B35">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=700;800&family=Roboto:wght=400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #FF6B35; /* Orange RT 04 */
            --primary-hover: #E0531F;
            --primary-light: rgba(255, 107, 53, 0.08);
            --bg-app: #F8FAFC;
            --card-bg: #FFFFFF;
            --border: #E2E8F0;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --radius-box: 16px;
            --radius-input: 12px;
            --safe-top: env(safe-area-inset-top, 0px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            -webkit-tap-highlight-color: transparent; /* Hilangkan highlight biru di chrome mobile */
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            padding: 0;
            font-size: 0.95rem;
            line-height: 1.5;
            padding-bottom: 40px;
        }

        h1, h2, h3, .app-header-title, .section-title, .btn {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* App Bar Header ala Mobile App Native */
        .app-bar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: calc(16px + var(--safe-top)) 20px 16px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.02);
        }

        .app-bar-icon {
            background: var(--primary);
            color: white;
            width: 42px;
            height: 42px;
            border-radius: var(--radius-input);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .app-bar-text .app-header-title {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .app-bar-text p {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Main Container Ringkas Khusus Mobile */
        .app-container {
            padding: 16px;
            max-width: 500px; /* Jika dibuka di tablet tetap rapi */
            margin: 0 auto;
        }

        .instruction-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: var(--radius-box);
            margin-bottom: 16px;
        }

        .instruction-card p {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--primary);
            margin: 24px 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Form Controls Versi Jempol Mobile (Lebar Penuh & Besar) */
        .form-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-main);
        }

        input[type="text"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-input);
            font-size: 0.95rem;
            background-color: var(--card-bg);
            color: var(--text-main);
            outline: none;
            transition: all 0.2s ease;
            -webkit-appearance: none; /* Hilangkan styling bawaan Safari iOS */
        }

        /* Custom Icon Arrow pada Form Dropdown Select */
        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '\f078';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 0.75rem;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3.5px rgba(255, 107, 53, 0.12);
        }

        /* Kartu Tumpuk Jiwa Penghuni */
        .warga-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-box);
            padding: 20px 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.01);
        }

        .warga-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--border);
        }

        .warga-card-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Kamera/Upload Box Khusus Layar HP */
        .mobile-upload-box {
            background: #FFF9F5;
            border: 1.5px dashed #FFBEA3;
            border-radius: var(--radius-input);
            padding: 18px;
            text-align: center;
            cursor: pointer;
            position: relative;
            margin-top: 6px;
            transition: all 0.2s ease;
        }
        .mobile-upload-box:active {
            background: #FFEFE5;
        }
        .mobile-upload-box i {
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 6px;
        }
        .mobile-upload-box p {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-main);
        }
        .mobile-upload-box span {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: block;
            margin-top: 2px;
        }
        .mobile-upload-box input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .file-chosen-name {
            font-size: 0.75rem;
            color: #0D9488;
            font-weight: 700;
            margin-top: 8px;
            display: none;
        }

        /* Button Touch-Friendly (Besar & Responsif) */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: var(--radius-input);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.15);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--primary);
            color: var(--primary);
        }
        .btn-danger-sm {
            background: #FEE2E2;
            color: #EF4444;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            border: none;
        }

        .hidden { display: none !important; }
        .footer-note { text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-top: 32px; font-weight: 500; }
    </style>
</head>
<body>

    <header class="app-bar">
        <div class="app-bar-icon"><i class="fas fa-file-invoice"></i></div>
        <div class="app-bar-text">
            <h1 class="app-header-title">Sensus RT 04</h1>
            <p>Data Hunian & Kategori Warga Dongkelan</p>
        </div>
    </header>

    <div class="app-container">
        
        <div class="instruction-card">
            <p><i class="fas fa-circle-info" style="color: var(--primary); margin-right: 4px;"></i> Silakan isi data tempat tinggal beserta seluruh identitas anggota keluarga Anda sesuai lembar asli Kartu Keluarga (KK).</p>
        </div>

        <form id="formSensusPwa" onsubmit="handleFormSubmit(event)">
            
            <div class="section-title"><i class="fas fa-house-chimney"></i> I. Informasi Hunian</div>
            
            <div class="form-group">
                <label for="statusHunian">Status Hunian / Tempat Tinggal *</label>
                <div class="select-wrapper">
                    <select id="statusHunian" required onchange="onStatusHunianChanged()">
                        <option value="">-- Pilih Status Hunian --</option>
                        <option value="Milik Sendiri">Milik Sendiri / Keluarga (Tetap)</option>
                        <option value="Sewa">Sewa / Kontrak</option>
                        <option value="Kos">Kos</option>
                        <option value="Mess">Mess / Asrama Karyawan Toko</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="noWhatsapp">No. WhatsApp Utama Pelapor *</label>
                <input type="text" id="noWhatsapp" inputmode="tel" placeholder="Contoh: 081234567xxx" required>
            </div>

            <div id="blokKKJimpitan" class="hidden">
                <div class="form-group">
                    <label for="noKK">Nomor Kartu Keluarga (16 Digit) *</label>
                    <input type="text" id="noKK" inputmode="numeric" placeholder="Masukkan 16 digit No. KK" maxlength="16">
                </div>
                <div class="form-group">
                    <label for="modeJimpitan">Mode Jimpitan Yang Diinginkan *</label>
                    <div class="select-wrapper">
                        <select id="modeJimpitan">
                            <option value="Harian">Harian (Koin Keliling)</option>
                            <option value="Bulanan">Bulanan (Iuran Tetap)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="blokKos" class="form-group hidden">
                <label for="namaPemilikKos">Nama Pemilik / Pengelola Kos *</label>
                <input type="text" id="namaPemilikKos" placeholder="Nama pemilik kos">
            </div>

            <div id="blokMess" class="hidden">
                <div class="form-group">
                    <label for="namaToko">Nama Toko / Tempat Usaha *</label>
                    <input type="text" id="namaToko" placeholder="Contoh: Toko Sembako Jaya">
                </div>
                <div class="form-group">
                    <label for="hpPemilikToko">No. HP Pemilik Usaha (Bos) *</label>
                    <input type="text" id="hpPemilikToko" inputmode="tel" placeholder="Masukkan nomor HP bos">
                </div>
            </div>

            <div id="blokTujuan" class="hidden">
                <div class="form-group">
                    <label for="tujuanMenetap">Tujuan Tinggal / Ngekos *</label>
                    <div class="select-wrapper">
                        <select id="tujuanMenetap" onchange="onTujuanMenetapChanged()">
                            <option value="">-- Pilih Tujuan --</option>
                            <option value="Kuliah">Kuliah / Sekolah</option>
                            <option value="Kerja">Bekerja / Mencari Nafkah</option>
                            <option value="Keluarga">Ikut Keluarga / Urusan Keluarga</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>
                </div>
                <div class="form-group hidden" id="blokTujuanDetail">
                    <label id="labelTujuanDetail" for="tujuanDetail">Nama Instansi / Kampus *</label>
                    <input type="text" id="tujuanDetail" placeholder="Masukkan nama tempat kerja/kuliah">
                </div>
            </div>

            <div class="form-group">
                <label for="noRumah">Nomor Rumah / Gedung *</label>
                <input type="text" id="noRumah" placeholder="Contoh: No. 12 atau Blok C" required>
            </div>

            <div class="form-group">
                <label for="alamatDetail">Alamat Rumah Lengkap & Detail *</label>
                <textarea id="alamatDetail" rows="3" placeholder="Tulis jalan, gang, nomor rumah, atau ciri khusus lokasi" required></textarea>
            </div>

            <div class="section-title"><i class="fas fa-users"></i> II. Elemen Data Jiwa (Kolom KK)</div>
            
            <div id="wargaCardsContainer">
                </div>

            <button type="button" class="btn btn-outline" style="margin-bottom: 24px;" onclick="tambahCardJiwaBaru()">
                <i class="fas fa-user-plus"></i> Tambah Penghuni Jiwa
            </button>

            <button type="submit" class="btn btn-primary" style="font-size: 1rem; padding: 16px;">
                <i class="fas fa-cloud-arrow-up"></i> Kirim Laporan Sensus
            </button>
            
            <p class="footer-note">Sensus Digital Mandiri • Paguyuban RT 04 Dongkelan</p>
        </form>
    </div>

    <script>
        let totalJiwaFormCount = 0;

        function onStatusHunianChanged() {
            const status = document.getElementById('statusHunian').value;
            
            document.getElementById('blokKKJimpitan').classList.add('hidden');
            document.getElementById('blokKos').classList.add('hidden');
            document.getElementById('blokMess').classList.add('hidden');
            document.getElementById('blokTujuan').classList.add('hidden');
            
            toggleRequiredAttr('noKK', false);
            toggleRequiredAttr('namaPemilikKos', false);
            toggleRequiredAttr('namaToko', false);
            toggleRequiredAttr('hpPemilikToko', false);
            toggleRequiredAttr('tujuanMenetap', false);

            if (status === 'Milik Sendiri') {
                document.getElementById('blokKKJimpitan').classList.remove('hidden');
                toggleRequiredAttr('noKK', true);
            } else if (status === 'Sewa') {
                document.getElementById('blokKKJimpitan').classList.remove('hidden');
                document.getElementById('blokTujuan').classList.remove('hidden');
                toggleRequiredAttr('noKK', true);
                toggleRequiredAttr('tujuanMenetap', true);
            } else if (status === 'Kos') {
                document.getElementById('blokKos').classList.remove('hidden');
                document.getElementById('blokTujuan').classList.remove('hidden');
                toggleRequiredAttr('namaPemilikKos', true);
                toggleRequiredAttr('tujuanMenetap', true);
            } else if (status === 'Mess') {
                document.getElementById('blokMess').classList.remove('hidden');
                toggleRequiredAttr('namaToko', true);
                toggleRequiredAttr('hpPemilikToko', true);
            }

            sinkronisasiKewajibanUploadKtp();
        }

        function onTujuanMenetapChanged() {
            const tujuan = document.getElementById('tujuanMenetap').value;
            const blokDetail = document.getElementById('blokTujuanDetail');
            const label = document.getElementById('labelTujuanDetail');
            const input = document.getElementById('tujuanDetail');

            if (tujuan === 'Kuliah') {
                blokDetail.classList.remove('hidden');
                label.innerText = "Nama Kampus / Sekolah *";
                input.placeholder = "Contoh: UMY, UAD, ISI Yogyakarta";
                input.required = true;
            } else if (tujuan === 'Kerja') {
                blokDetail.classList.remove('hidden');
                label.innerText = "Nama Tempat Kerja / Perusahaan *";
                input.placeholder = "Contoh: Pabrik, Swalayan, Karyawan Resto";
                input.required = true;
            } else if (tujuan === 'Lainnya') {
                blokDetail.classList.remove('hidden');
                label.innerText = "Keterangan Spesifik Tujuan *";
                input.placeholder = "Tuliskan tujuan menetap Anda";
                input.required = true;
            } else {
                blokDetail.classList.add('hidden');
                input.required = false;
            }
        }

        function toggleRequiredAttr(id, isRequired) {
            const el = document.getElementById(id);
            if (el) el.required = isRequired;
        }

        // Menambahkan Baris Form Secara Vertikal Tumpuk Kebawah Khusus Mobile Screen
        function tambahCardJiwaBaru() {
            totalJiwaFormCount++;
            const container = document.getElementById('wargaCardsContainer');
            
            const cardHtml = `
                <div class="warga-card" id="wargaCard_${totalJiwaFormCount}">
                    <div class="warga-card-header">
                        <div class="warga-card-title"><i class="fas fa-user-tag" style="color: var(--primary);"></i> Jiwa Penghuni #${totalJiwaFormCount}</div>
                        ${totalJiwaFormCount > 1 ? `<button type="button" class="btn-danger-sm" onclick="hapusCardJiwa(${totalJiwaFormCount})"><i class="fas fa-trash-can"></i> Hapus</button>` : ''}
                    </div>

                    <div class="form-group">
                        <label>Nama Lengkap (Sesuai KTP) *</label>
                        <input type="text" name="nama_lengkap[]" placeholder="Nama Lengkap" required>
                    </div>

                    <div class="form-group">
                        <label>NIK / No. KTP (16 Digit) *</label>
                        <input type="text" name="nik[]" inputmode="numeric" placeholder="Masukkan 16 digit NIK" maxlength="16" required>
                    </div>

                    <div class="form-group">
                        <label>Jenis Kelamin *</label>
                        <div class="select-wrapper">
                            <select name="jk[]" required>
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Tempat Lahir *</label>
                        <input type="text" name="tempat_lahir[]" placeholder="Kota Tempat Lahir" required>
                    </div>

                    <div class="form-group">
                        <label>Tanggal Lahir *</label>
                        <input type="date" name="tanggal_lahir[]" required>
                    </div>

                    <div class="form-group">
                        <label>Agama / Kepercayaan *</label>
                        <div class="select-wrapper">
                            <select name="agama[]" required>
                                <option value="Islam">Islam</option>
                                <option value="Kristen">Kristen</option>
                                <option value="Katolik">Katolik</option>
                                <option value="Hindu">Hindu</option>
                                <option value="Budha">Budha</option>
                                <option value="Konghucu">Konghucu</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Pendidikan Terakhir *</label>
                        <div class="select-wrapper">
                            <select name="pendidikan[]" required>
                                <option value="SD">SD / Sederajat</option>
                                <option value="SMP">SMP / Sederajat</option>
                                <option value="SMA">SMA / SMK / Sederajat</option>
                                <option value="Diploma">Diploma (D1-D4)</option>
                                <option value="S1">Sarjana (S1)</option>
                                <option value="Pascasarjana">Pascasarjana (S2/S3)</option>
                                <option value="Tidak Sekolah">Tidak / Belum Sekolah</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Jenis Pekerjaan *</label>
                        <input type="text" name="pekerjaan[]" placeholder="Contoh: Karyawan, Mahasiswa, Buruh" required>
                    </div>

                    <div class="form-group">
                        <label>Status Perkawinan *</label>
                        <div class="select-wrapper">
                            <select name="status_kawin[]" required>
                                <option value="Belum Kawin">Belum Kawin</option>
                                <option value="Kawin">Kawin</option>
                                <option value="Cerai Hidup">Cerai Hidup</option>
                                <option value="Cerai Mati">Cerai Mati</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Hubungan Dalam Keluarga *</label>
                        <div class="select-wrapper">
                            <select name="hubungan_kk[]" class="select-hubungan-jiwa" required>
                                <option value="Kepala Keluarga">Kepala Keluarga / Penghuni Utama</option>
                                <option value="Istri">Istri</option>
                                <option value="Anak">Anak</option>
                                <option value="Orang Tua">Orang Tua / Mertua</option>
                                <option value="Karyawan">Karyawan (Khusus Mess Toko)</option>
                                <option value="Famili Lain">Famili Lain / Anggota Kamar</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group-upload-ktp hidden" style="margin-top: 14px;">
                        <label>Dokumen Foto KTP / KIA (Wajib) *</label>
                        <div class="mobile-upload-box">
                            <i class="fas fa-camera"></i>
                            <p>Ambil Foto KTP via Kamera</p>
                            <span>atau pilih dari file galeri HP</span>
                            <input type="file" name="foto_ktp[]" accept="image/*" class="input-file-ktp" onchange="handleFileSelectedNotify(this)">
                        </div>
                        <div class="file-chosen-name"><i class="fas fa-circle-check"></i> Berkas siap dilampirkan</div>
                    </div>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', cardHtml);
            sinkronisasiKewajibanUploadKtp();
        }

        function handleFileSelectedNotify(inputElement) {
            const labelNotif = inputElement.parentElement.nextElementSibling;
            if(inputElement.files && inputElement.files[0]) {
                labelNotif.innerHTML = `<i class="fas fa-circle-check"></i> ✓ Berkas siap: <b>${inputElement.files[0].name.substring(0, 20)}...</b>`;
                labelNotif.style.display = "block";
            } else {
                labelNotif.style.display = "none";
            }
        }

        function hapusCardJiwa(id) {
            const card = document.getElementById(`wargaCard_${id}`);
            if(card) card.remove();
        }

        function sinkronisasiKewajibanUploadKtp() {
            const status = document.getElementById('statusHunian').value;
            const cards = document.querySelectorAll('.warga-card');

            cards.forEach((card) => {
                const selectHubungan = card.querySelector('.select-hubungan-jiwa');
                const uploadSection = card.querySelector('.form-group-upload-ktp');
                const fileInput = card.querySelector('.input-file-ktp');

                // JIKA MILIK SENDIRI / TETAP: Form upload KTP hilang total secara PWA-friendly
                if (status === 'Milik Sendiri' || status === '') {
                    uploadSection.classList.add('hidden');
                    fileInput.required = false;
                    fileInput.value = "";
                    
                    if (selectHubungan.value === 'Karyawan') selectHubungan.value = 'Kepala Keluarga';
                    selectHubungan.disabled = false;
                } 
                // JIKA KONTRAK, KOS, MESS: Wajib upload KTP
                else {
                    uploadSection.classList.remove('hidden');
                    fileInput.required = true;

                    if (status === 'Mess') {
                        selectHubungan.value = 'Karyawan';
                        selectHubungan.disabled = true;
                    } else {
                        if (selectHubungan.value === 'Karyawan') selectHubungan.value = 'Kepala Keluarga';
                        selectHubungan.disabled = false;
                    }
                }
            });
        }

        function handleFormSubmit(event) {
            event.preventDefault();
            document.querySelectorAll('.select-hubungan-jiwa').forEach(s => s.disabled = false);
            alert("Mantap, bro! Semua data sensus mobile berhasil divalidasi.");
        }

        window.onload = function() {
            tambahCardJiwaBaru();
        };
    </script>
</body>
</html>
