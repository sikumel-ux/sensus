<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sensus Warga RT 04</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<header>

<div class="logo">
<i class="fas fa-users"></i>
</div>

<h1>Sensus Warga</h1>

<p>RT 04 RW 02</p>

</header>

<section class="hero">

<h2>Selamat Datang</h2>

<p>Silakan pilih kategori penghuni</p>

</section>

<section class="kategori">

<div class="card-kategori"
onclick="pilihKategori('tetap')">

<i class="fas fa-house-user"></i>

<h3>Warga Tetap</h3>

<p>Pemilik rumah atau penghuni tetap</p>

</div>

<div class="card-kategori"
onclick="pilihKategori('pendatang')">

<i class="fas fa-suitcase"></i>

<h3>Pendatang</h3>

<p>Kos atau Kontrakan</p>

</div>

<div class="card-kategori"
onclick="pilihKategori('menumpang')">

<i class="fas fa-user-friends"></i>

<h3>Menumpang</h3>

<p>ART, Sopir, Saudara dll</p>

</div>

</section>

<section
id="formSection"
class="form-section">

<h2 id="judulForm">

Form Pendaftaran

</h2>

<form id="formWarga">

<input
type="hidden"
id="kategori">

<input
type="text"
id="nama"
placeholder="Nama Lengkap"
required>

<input
type="text"
id="nik"
placeholder="NIK"
required>

<input
type="text"
id="hp"
placeholder="Nomor HP">

<div id="dynamicFields"></div>

<label>Foto KTP</label>

<input
type="file"
id="foto_ktp"
accept="image/*">

<button type="submit">

Kirim Pendaftaran

</button>

</form>

<div id="successBox">

<h3>✅ Data Berhasil Dikirim</h3>

<p>Silakan menunggu verifikasi RT.</p>

</div>

</section>

<footer>

Copyright © 2026 Tuntas

</footer>

<script>

function pilihKategori(kategori){

const formSection =
document.getElementById("formSection");

const dynamicFields =
document.getElementById("dynamicFields");

const judulForm =
document.getElementById("judulForm");

document.getElementById("kategori").value =
kategori;

formSection.style.display = "block";

if(kategori === "tetap"){

judulForm.innerText =
"Form Warga Tetap";

dynamicFields.innerHTML = `

<input
type="text"
id="pekerjaan"
placeholder="Pekerjaan">

<textarea
id="alamat"
placeholder="Alamat Rumah"></textarea>

<select id="statusRumah">

<option>Milik Sendiri</option>

<option>Keluarga</option>

<option>Lainnya</option>

</select>

`;

}

if(kategori === "pendatang"){

judulForm.innerText =
"Form Pendatang";

dynamicFields.innerHTML = `

<select id="jenisTinggal">

<option>Kos</option>

<option>Kontrakan</option>

</select>

<input
type="text"
id="alamatAsal"
placeholder="Alamat Asal">

<input
type="text"
id="alamatSekarang"
placeholder="Alamat Tinggal Saat Ini">

<input
type="date"
id="tglMasuk">

`;

}

if(kategori === "menumpang"){

judulForm.innerText =
"Form Menumpang";

dynamicFields.innerHTML = `

<select id="jenisMenumpang">

<option>ART</option>

<option>Sopir</option>

<option>Saudara</option>

<option>Lainnya</option>

</select>

<input
type="text"
id="penanggungJawab"
placeholder="Nama Penanggung Jawab">

<input
type="text"
id="alamatAsal"
placeholder="Alamat Asal">

<input
type="date"
id="tglMasuk">

`;

}

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

}

document
.getElementById("formWarga")
.addEventListener("submit",(e)=>{

e.preventDefault();

document.getElementById(
"successBox"
).style.display = "block";

});

</script>

</body>
</html>
