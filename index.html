<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sensus Warga RT 04</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>
<body>

<div class="bg1"></div>
<div class="bg2"></div>

<header>

<div class="logo">
<i class="fas fa-users"></i>
</div>

<h1>Sensus Warga</h1>

<p>RT 04 RW 02</p>

</header>

<section class="hero">

<h2>Selamat Datang</h2>

<p>
Silakan pilih kategori penghuni
</p>

</section>

<section class="kategori">

<div
class="card-kategori"
onclick="pilihKategori('tetap')">

<i class="fas fa-house-user"></i>

<h3>Warga Tetap</h3>

<p>
Pemilik rumah atau penghuni tetap
</p>

</div>

<div
class="card-kategori"
onclick="pilihKategori('pendatang')">

<i class="fas fa-suitcase"></i>

<h3>Pendatang</h3>

<p>
Kos atau Kontrakan
</p>

</div>

<div
class="card-kategori"
onclick="pilihKategori('menumpang')">

<i class="fas fa-user-friends"></i>

<h3>Menumpang</h3>

<p>
ART, Sopir, Saudara dll
</p>

</div>

</section>

<section
id="formSection"
class="form-section">

<h2 id="judulForm">
Form Pendaftaran
</h2>

<form id="formWarga">

<input
type="hidden"
id="kategori">

<input
type="text"
id="nama"
placeholder="Nama Lengkap"
required>

<input
type="text"
id="nik"
placeholder="NIK"
required>

<input
type="text"
id="kk"
placeholder="Nomor KK">

<select id="jk">

<option value="">
Jenis Kelamin
</option>

<option>
Laki-laki
</option>

<option>
Perempuan
</option>

</select>

<input
type="text"
id="tempat_lahir"
placeholder="Tempat Lahir">

<input
type="date"
id="tgl_lahir">

<input
type="text"
id="hp"
placeholder="Nomor HP">

<div id="dynamicFields"></div>

<label>
Foto KTP
</label>

<input
type="file"
id="foto_ktp"
accept="image/*">

<button type="submit">

Kirim Pendaftaran

</button>

</form>

<div id="successBox">

<h3>
✅ Data Berhasil Dikirim
</h3>

<p>
Silakan menunggu verifikasi RT.
</p>

</div>

</section>

<footer>

Copyright © 2026
Tuntas

</footer>

<script>

function pilihKategori(kategori){

const form =
document.getElementById(
"formSection"
);

const dynamic =
document.getElementById(
"dynamicFields"
);

const judul =
document.getElementById(
"judulForm"
);

document.getElementById(
"kategori"
).value = kategori;

form.style.display="block";

if(kategori==="tetap"){

judul.innerText =
"Form Warga Tetap";

dynamic.innerHTML=`

<input
type="text"
id="pekerjaan"
placeholder="Pekerjaan">

<textarea
id="alamat"
placeholder="Alamat Rumah">
</textarea>

<select
id="status_rumah">

<option>
Milik Sendiri
</option>

<option>
Keluarga
</option>

<option>
Lainnya
</option>

</select>

`;

}

if(kategori==="pendatang"){

judul.innerText =
"Form Pendatang";

dynamic.innerHTML=`

<select id="jenis_tinggal">

<option>
Kos
</option>

<option>
Kontrakan
</option>

</select>

<input
type="text"
id="alamat_asal"
placeholder="Alamat Asal">

<input
type="text"
id="alamat_tinggal"
placeholder="Alamat Tinggal Saat Ini">

<input
type="text"
id="pemilik"
placeholder="Nama Pemilik Kos/Kontrakan">

<input
type="date"
id="tgl_masuk">

<input
type="text"
id="pekerjaan"
placeholder="Pekerjaan">

`;

}

if(kategori==="menumpang"){

judul.innerText =
"Form Menumpang";

dynamic.innerHTML=`

<select id="jenis_menumpang">

<option>
ART
</option>

<option>
Sopir
</option>

<option>
Saudara
</option>

<option>
Lainnya
</option>

</select>

<input
type="text"
id="penanggung_jawab"
placeholder="Nama Penanggung Jawab">

<input
type="text"
id="alamat_asal"
placeholder="Alamat Asal">

<input
type="date"
id="tgl_masuk">

`;

}

window.scrollTo({

top:
document.body.scrollHeight,

behavior:
"smooth"

});

}

document
.getElementById("formWarga")
.addEventListener(
"submit",
function(e){

e.preventDefault();

document
.getElementById(
"successBox"
)
.style.display =
"block";

this.reset();

});

</script>

</body>
</html>
