<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sensus Warga RT 04</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<header>

    <div class="logo">

        <i class="fas fa-users"></i>

    </div>

    <h1>Sensus Warga</h1>

    <p>
        RT 04 RW 02
    </p>

</header>

<section class="hero">

    <h2>
        Selamat Datang
    </h2>

    <p>
        Silakan pilih kategori Anda
    </p>

</section>

<section class="kategori">

    <div
    class="card-kategori"
    onclick="pilihKategori('tetap')">

        <i class="fas fa-house-user"></i>

        <h3>Warga Tetap</h3>

        <p>
            Pemilik rumah atau penghuni tetap
        </p>

    </div>

    <div
    class="card-kategori"
    onclick="pilihKategori('pendatang')">

        <i class="fas fa-suitcase"></i>

        <h3>Pendatang</h3>

        <p>
            Kos atau kontrakan
        </p>

    </div>

    <div
    class="card-kategori"
    onclick="pilihKategori('menumpang')">

        <i class="fas fa-user-friends"></i>

        <h3>Menumpang</h3>

        <p>
            ART, Sopir, Saudara dll
        </p>

    </div>

</section>

<section
id="formSection"
class="form-section">

<form id="formWarga">

<input
type="hidden"
id="kategori">

<input
type="text"
id="nama"
placeholder="Nama Lengkap"
required>

<input
type="text"
id="nik"
placeholder="NIK"
required>

<input
type="text"
id="hp"
placeholder="Nomor HP">

<div id="dynamicFields"></div>

<button
type="submit">

Kirim Data

</button>

</form>

</section>

<footer>

Copyright © 2026
Tuntas

</footer>

<script>

function pilihKategori(kategori){

document.getElementById(
"formSection"
).style.display="block";

document.getElementById(
"kategori"
).value=kategori;

const dynamic =
document.getElementById(
"dynamicFields"
);

if(kategori==="tetap"){

dynamic.innerHTML=`

<input
type="text"
placeholder="Pekerjaan">

<textarea
placeholder="Alamat Rumah">
</textarea>

`;

}

if(kategori==="pendatang"){

dynamic.innerHTML=`

<select>

<option>
Kos
</option>

<option>
Kontrakan
</option>

</select>

<input
type="text"
placeholder="Alamat Asal">

<input
type="date">

`;

}

if(kategori==="menumpang"){

dynamic.innerHTML=`

<select>

<option>
ART
</option>

<option>
Sopir
</option>

<option>
Saudara
</option>

<option>
Lainnya
</option>

</select>

<input
type="text"
placeholder="Nama Penanggung Jawab">

<input
type="date">

`;

}

window.scrollTo({

top:document.body.scrollHeight,

behavior:"smooth"

});

}

</script>

</body>
</html>
