<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sensus RT 04 Digital App v6.3 (Sisi Warga)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        :root {
            --bg-app: #F8FAFC;
            --card-bg: #FFFFFF;
            --bg-input: #F1F5F9;
            --border: #E2E8F0;
            --primary: #FF6B35;
            --primary-light: rgba(255, 107, 53, 0.08);
            --primary-gradient: linear-gradient(135deg, #E0531F 0%, #FF6B35 60%, #FF8557 100%);
            --teal: #0D9488;
            --teal-light: rgba(13, 148, 136, 0.1);
            --accent-warn: #EF4444;
            --accent-warn-light: rgba(239, 68, 68, 0.1);
            --text-main: #0F172A;
            --text-muted: #64748B;
            --radius-lg: 20px;
            --radius-md: 12px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-app); color: var(--text-main); min-height: 100vh; padding-bottom: 40px; font-size: 0.85rem; }

        .app-header {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            color: var(--text-main); padding: 25px 20px; border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg);
            border-bottom: 1px solid var(--border); text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        .app-header .header-logo {
            width: 50px; height: 50px; background: var(--primary-light); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; margin: 0 auto 10px auto; border: 1px solid rgba(255, 107, 53, 0.2); color: var(--primary);
        }
        .app-header h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px; }
        .app-header p { color: var(--text-muted); font-size: 0.75rem; margin-top: 2px; }

        .app-container { max-width: 650px; margin: 15px auto 0 auto; padding: 0 12px; }

        .app-card {
            background: var(--card-bg); border-radius: var(--radius-lg); padding: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04); border: 1px solid var(--border); margin-bottom: 16px;
        }

        .card-title-group {
            display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 16px;
        }
        .card-title-group .step-icon {
            background: var(--primary-light); color: var(--primary); width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem;
        }
        .card-title-group h3 { font-size: 0.95rem; font-weight: 700; color: var(--text-main); }

        .form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 0.68rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        
        .form-control {
            width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-md);
            font-size: 0.85rem; background: #fff; outline: none; transition: var(--transition); color: var(--text-main);
        }
        .form-control:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px var(--primary-light); }

        .info-note { background: var(--primary-light); border-left: 4px solid var(--primary); padding: 10px; border-radius: 6px; font-size: 0.78rem; color: var(--text-main); margin-bottom: 12px; }
        .warga-item-box { background: var(--bg-app); border: 1px dashed var(--border); border-radius: var(--radius-md); padding: 16px; margin-bottom: 12px; position: relative; }
        .btn-delete-row { position: absolute; right: 12px; top: 12px; background: var(--accent-warn-light); color: var(--accent-warn); border: none; padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; cursor: pointer; }

        .upload-box-wrapper { display: none; margin-top: 4px; }
        .file-zone { border: 2px dashed var(--border); background: #fff; padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; transition: var(--transition); }
        .file-zone.has-file { border-color: var(--teal); background: var(--teal-light); }
        .file-zone i { font-size: 1.2rem; color: var(--text-muted); }

        .error-hint { color: var(--accent-warn); font-size: 0.7rem; font-weight: 600; display: none; margin-top: 1px; }

        .btn-action { width: 100%; padding: 12px; border: none; border-radius: var(--radius-md); font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary-gradient); color: white; box-shadow: 0 4px 14px rgba(255, 107, 53, 0.3); }
        .btn-primary:disabled { background: #CBD5E1; color: #94A3B8; box-shadow: none; cursor: not-allowed; }
        .btn-outline { background: transparent; color: var(--primary); border: 2px dashed var(--primary); margin-top: 8px; }
        .btn-outline:hover { background: var(--primary-light); }

        .custom-alert-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); z-index: 9999; justify-content: center; align-items: center; padding: 16px; }
        .alert-box { background: #fff; border-radius: var(--radius-lg); padding: 25px 20px; max-width: 400px; width: 100%; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .code-display { background: var(--primary-light); border: 2px dashed var(--primary); padding: 10px; font-size: 1.25rem; font-weight: 800; color: var(--primary); letter-spacing: 2px; border-radius: var(--radius-md); margin-bottom: 20px; }
        .btn-modal-close { background: var(--text-main); color: white; border: none; padding: 12px; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; width: 100%; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-logo"><i class="fas fa-users-viewfinder"></i></div>
        <h1>Sensus RT 04 Digital</h1>
        <p>Formulir Pengumpulan Data Swadaya Warga</p>
    </header>

    <div class="app-container">

        <form id="mainSensusForm" onsubmit="prosesKolektifKirimData(event)">
            
            <div class="app-card">
                <div class="card-title-group">
                    <div class="step-icon">1</div>
                    <h3>Data Properti & Nomor KK</h3>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nomor Kartu Keluarga (16 Digit)</label>
                        <input type="text" id="no_kk" class="form-control" placeholder="3402xxxxxxxxxxxx" inputmode="numeric" maxlength="16" oninput="this.value = this.value.replace(/[^0-9]/g, '');" required>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label>Status Hunian</label>
                            <select id="status_rumah" class="form-control" onchange="sinkronisasiKategoriWargaAll()">
                                <option value="Milik Sendiri">Milik Sendiri / Keluarga Tetap</option>
                                <option value="Sewa / Kontrak">Sewa / Kontrak Rumah</option>
                                <option value="Kos">Kos Mandiri</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Nomor Rumah</label>
                            <input type="text" id="no_rumah" class="form-control" placeholder="Contoh: No. 12" required>
                        </div>
                    </div>
                    
                    <div class="form-group" id="wrapperPemilikKos" style="display: none;">
                        <label style="color: var(--primary);">Nama Pemilik Kos</label>
                        <input type="text" id="nama_pemilik_kos" class="form-control" placeholder="Tulis nama pemilik atau pengelola kos">
                    </div>

                    <div class="form-group">
                        <label>No. WhatsApp Utama (Penanggung Jawab)</label>
                        <input type="text" id="wa_utama" class="form-control" placeholder="Contoh: 081234567xxx" oninput="this.value = this.value.replace(/[^0-9]/g, '');" required>
                    </div>
                </div>
            </div>

            <div class="app-card">
                <div class="card-title-group">
                    <div class="step-icon">2</div>
                    <h3>Daftar Anggota Jiwa</h3>
                </div>
                <div id="infoNoteStatus" class="info-note">
                    <i class="fas fa-info-circle"></i> Memasukkan data Kepala Keluarga & seluruh anggota yang tinggal di rumah ini.
                </div>
                <div id="wargaListContainer"></div>
                <button type="button" id="btnTambahAnggota" class="btn-action btn-outline" onclick="tambahWargaRow()">
                    <i class="fas fa-user-plus"></i> Tambah Anggota Jiwa
                </button>
            </div>

            <div class="app-card">
                <div class="form-group" style="flex-direction:row; gap:10px; align-items:flex-start;">
                    <input type="checkbox" id="chkPernyataan" style="width:18px; height:18px; margin-top:2px; accent-color:var(--primary);" required>
                    <label for="chkPernyataan" style="text-transform:none; font-size:0.8rem; font-weight:600; color:var(--text-main); cursor:pointer;">
                        Saya menyatakan bahwa data yang diisi di atas sudah sesuai dengan keadaan yang sebenarnya.
                    </label>
                </div>
            </div>

            <button type="submit" id="btnSubmitFinal" class="btn-action btn-primary"><i class="fas fa-cloud-arrow-up"></i> Kirim Formulir Sensus</button>
        </form>

    </div>

    <div id="customAlertOverlay" class="custom-alert-overlay">
        <div class="alert-box" id="alertBoxContent"></div>
    </div>

    <script>
        // =========================================================================
        // TEMPELKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
        // =========================================================================
        const GOOGLE_SCRIPT_API_URL = "PASANG_URL_APPS_SCRIPT_DI_SINI";

        let rowCount = 0;

        function sinkronisasiKategoriWargaAll() {
            const statusRumah = document.getElementById("status_rumah").value;
            const wrapperKos = document.getElementById("wrapperPemilikKos");
            const inputPemilik = document.getElementById("nama_pemilik_kos");
            const infoNote = document.getElementById("infoNoteStatus");

            // Atur kondisional field Nama Pemilik Kos
            if (statusRumah === "Kos") {
                wrapperKos.style.display = "block";
                inputPemilik.setAttribute("required", "required");
                infoNote.innerHTML = `<i class="fas fa-info-circle"></i> <b>Mode Kos:</b> Masukkan data seluruh anggota keluarga yang ikut mengekos di tempat ini.`;
            } else {
                wrapperKos.style.display = "none";
                inputPemilik.removeAttribute("required");
                inputPemilik.value = "";
                infoNote.innerHTML = `<i class="fas fa-info-circle"></i> Memasukkan data Kepala Keluarga & seluruh anggota yang tinggal di rumah ini.`;
            }

            // Update baris-baris dropdown hubungan keluarga yang sudah ada di bawah
            document.querySelectorAll(".input-status").forEach(selectNode => {
                const currentId = selectNode.id.split("_")[1];
                updateDropdownOpsiHubungan(selectNode, statusRumah);
                evaluasiKewajibanKtp(selectNode, currentId);
            });
        }

        function updateDropdownOpsiHubungan(selectElement, statusHunian) {
            const valSebelumnya = selectElement.value;
            if (statusHunian === "Kos") {
                selectElement.innerHTML = `<option value="Kos">Kos</option>`;
            } else if (statusHunian === "Sewa / Kontrak") {
                selectElement.innerHTML = `<option value="Kontrakan">Penyewa Rumah Utama</option><option value="Anggota Kontrak">Anggota Ikut Mengontrak</option>`;
            } else {
                selectElement.innerHTML = `<option value="Kepala Keluarga">Kepala Keluarga</option><option value="Istri">Istri</option><option value="Anak">Anak</option><option value="Orang Tua">Orang Tua</option>`;
            }
            // Kembalikan ke value sebelumnya jika opsi tersebut masih tersedia
            if (selectElement.querySelector(`option[value="${valSebelumnya}"]`)) {
                selectElement.value = valSebelumnya;
            }
        }

        function tambahWargaRow() {
            rowCount++;
            const container = document.getElementById("wargaListContainer");
            const statusRumah = document.getElementById("status_rumah").value;
            const row = document.createElement("div");
            row.className = "warga-item-box";
            row.id = `wargaRow_${rowCount}`;
            
            row.innerHTML = `
                <button type="button" class="btn-delete-row" onclick="hapusWargaRow(${rowCount})">Hapus</button>
                <div class="form-grid">
                    <div class="form-row-2">
                        <div class="form-group"><label>Nama Lengkap</label><input type="text" class="form-control input-nama" required></div>
                        <div class="form-group">
                            <label>NIK (16 Digit)</label>
                            <input type="text" class="form-control input-nik" inputmode="numeric" maxlength="16" oninput="this.value = this.value.replace(/[^0-9]/g, ''); cekPanjangNikLive(this, ${rowCount});" required>
                            <div id="errorNik_${rowCount}" class="error-hint">NIK wajib 16 angka!</div>
                        </div>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group"><label>Tempat Lahir</label><input type="text" class="form-control input-tempat-lahir" required></div>
                        <div class="form-group"><label>Tanggal Lahir</label><input type="date" class="form-control input-tanggal-lahir" required></div>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label>Jenis Kelamin</label>
                            <select class="form-control input-jk">
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Agama</label>
                            <select class="form-control input-agama">
                                <option value="Islam">Islam</option><option value="Kristen">Kristen</option><option value="Katolik">Katolik</option><option value="Hindu">Hindu</option><option value="Budha">Budha</option><option value="Konghucu">Konghucu</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group"><label>Pekerjaan</label><input type="text" class="form-control input-pekerjaan" required></div>
                        <div class="form-group">
                            <label>Hubungan Keluarga</label>
                            <select class="form-control input-status" id="statusHub_${rowCount}" onchange="evaluasiKewajibanKtp(this, ${rowCount})"></select>
                        </div>
                    </div>
                    <div class="form-group upload-box-wrapper" id="uploadWrapper_${rowCount}">
                        <label style="color:var(--primary)">Berkas Wajib Lampiran KTP</label>
                        <div class="file-zone" id="fileZone_${rowCount}" onclick="document.getElementById('file_${rowCount}').click()">
                            <i class="fas fa-id-card"></i>
                            <p id="fileNameLabel_${rowCount}" style="font-size:0.75rem;">Upload Foto KTP</p>
                            <input type="file" id="file_${rowCount}" class="input-file" accept="image/*" style="display:none;" onchange="prosesKonversiFileToBase64(this, ${rowCount})">
                            <input type="hidden" id="hiddenBase64_${rowCount}" class="input-hidden-base64">
                        </div>
                    </div>
                </div>`;
            container.appendChild(row);
            
            const selectEl = document.getElementById(`statusHub_${rowCount}`);
            updateDropdownOpsiHubungan(selectEl, statusRumah);
            evaluasiKewajibanKtp(selectEl, rowCount);
        }

        function cekPanjangNikLive(input, id) {
            document.getElementById(`errorNik_${id}`).style.display = (input.value.length > 0 && input.value.length < 16) ? "block" : "none";
        }

        function hapusWargaRow(id) { 
            const rows = document.querySelectorAll(".warga-item-box");
            if(rows.length <= 1) {
                alert("Minimal harus ada 1 data warga yang diisi!");
                return;
            }
            const row = document.getElementById(`wargaRow_${id}`); 
            if (row) row.remove(); 
        }
        
        function prosesKonversiFileToBase64(input, id) {
            const zone = document.getElementById(`fileZone_${id}`);
            const lbl = document.getElementById(`fileNameLabel_${id}`);
            const hiddenInput = document.getElementById(`hiddenBase64_${id}`);
            
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    hiddenInput.value = e.target.result;
                    zone.classList.add("has-file");
                    lbl.innerText = `✓ Terkunci: ${file.name}`;
                };
                reader.readAsDataURL(file);
            } else {
                hiddenInput.value = ""; zone.classList.remove("has-file"); lbl.innerText = "Upload Foto KTP";
            }
        }

        function evaluasiKewajibanKtp(select, id) {
            const wrapper = document.getElementById(`uploadWrapper_${id}`);
            const inputNode = document.getElementById(`file_${id}`);
            if(!wrapper || !inputNode) return;

            // Warga kos atau pengontrak wajib melampirkan berkas KTP fisik
            if(select.value === "Kos" || select.value === "Kontrakan" || select.value === "Anggota Kontrak") {
                wrapper.style.display = "block"; inputNode.setAttribute("required", "required");
            } else {
                wrapper.style.display = "none"; inputNode.removeAttribute("required"); inputNode.value = "";
                document.getElementById(`hiddenBase64_${id}`).value = "";
                document.getElementById(`fileZone_${id}`).classList.remove("has-file");
                document.getElementById(`fileNameLabel_${id}`).innerText = "Upload Foto KTP";
            }
        }

        function panggilCustomModal(tipe, judul, pesan, detail = "") {
            const box = document.getElementById("alertBoxContent");
            if(tipe === "sukses") {
                box.innerHTML = `
                    <div style="font-size:2.5rem; color:var(--teal); margin-bottom:12px;"><i class="fas fa-circle-check"></i></div>
                    <h3>${judul}</h3><p style="margin:8px 0; color:var(--text-muted);">${pesan}</p>
                    <div class="code-display">${detail}</div>
                    <button class="btn-modal-close" onclick="tutupAlertDanResetForm()">Selesai</button>`;
            } else {
                box.innerHTML = `
                    <div style="font-size:2.5rem; color:var(--accent-warn); margin-bottom:12px;"><i class="fas fa-triangle-exclamation"></i></div>
                    <h3 style="color:var(--accent-warn)">${judul}</h3><p style="margin:8px 0; color:var(--text-muted);">${pesan}</p>
                    <button class="btn-modal-close" style="background:var(--accent-warn)" onclick="tutupModalOnly()">Perbaiki Form</button>`;
            }
            document.getElementById("customAlertOverlay").style.display = "flex";
        }

        function tutupModalOnly() { document.getElementById("customAlertOverlay").style.display = "none"; }
        
        function tutupAlertDanResetForm() {
            document.getElementById("customAlertOverlay").style.display = "none";
            document.getElementById("mainSensusForm").reset();
            document.getElementById("wargaListContainer").innerHTML = "";
            sinkronisasiKategoriWargaAll();
            tambahWargaRow();
        }

        function generateRandomCode() {
            const char = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let out = "";
            for (let i = 0; i < 4; i++) { out += char.charAt(Math.floor(Math.random() * char.length)); }
            return `RT04-${out}`;
        }

        function prosesKolektifKirimData(e) {
            e.preventDefault();

            if(GOOGLE_SCRIPT_API_URL === "PASANG_URL_APPS_SCRIPT_DI_SINI") {
                panggilCustomModal("error", "API Belum Diisi", "Mohon pasang Web App URL Apps Script Anda di baris JavaScript kode ini.");
                return;
            }

            const noKkField = document.getElementById("no_kk").value.trim();
            if(noKkField.length !== 16) { alert("Nomor Kartu Keluarga wajib 16 digit!"); return; }

            const chk = document.getElementById("chkPernyataan");
            if(!chk.checked) { alert("Anda wajib mencentang pernyataan kebenaran data!"); return; }

            const rows = document.querySelectorAll(".warga-item-box");
            let listNik = []; let payloadAnggota = []; let flagLolos = true;

            for (let row of rows) {
                const nik = row.querySelector(".input-nik").value.trim();
                const nama = row.querySelector(".input-nama").value.trim();
                const hiddenBase64 = row.querySelector(".input-hidden-base64");

                if(nik.length !== 16) { alert(`NIK untuk ${nama} belum 16 digit!`); flagLolos = false; break; }
                if(listNik.includes(nik)) { alert("Ada nomor NIK ganda di formulir!"); flagLolos = false; break; }
                listNik.push(nik);

                payloadAnggota.push({
                    nama: nama,
                    nik: nik,
                    tempatLahir: row.querySelector(".input-tempat-lahir").value,
                    tanggalLahir: row.querySelector(".input-tanggal-lahir").value,
                    jk: row.querySelector(".input-jk").value,
                    agama: row.querySelector(".input-agama").value,
                    pekerjaan: row.querySelector(".input-pekerjaan").value,
                    hubungan: row.querySelector(".input-status").value,
                    ktpBase64: hiddenBase64 ? hiddenBase64.value : ""
                });
            }

            if(!flagLolos) return;

            const btn = document.getElementById("btnSubmitFinal");
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Memvalidasi No. KK...`;
            btn.setAttribute("disabled", "disabled");

            // VALIDASI LIVE: Cek apakah KK sudah pernah mengirim data sebelumnya
            fetch(GOOGLE_SCRIPT_API_URL)
            .then(res => res.json())
            .then(database => {
                let kkSudahAda = database.some(item => item.noKk === "'" + noKkField || item.noKk === noKkField);
                if(kkSudahAda) {
                    panggilCustomModal("error", "No. KK Sudah Terdaftar", `Sensus gagal. Kartu Keluarga dengan No: <b>${noKkField}</b> terdeteksi sudah pernah mengisi form sensus.`);
                    btn.innerHTML = `<i class="fas fa-cloud-arrow-up"></i> Kirim Formulir Sensus`;
                    btn.removeAttribute("disabled");
                    return;
                }

                // Jika lolos duplikasi, kirim data sensus baru
                const kodeRegistrasi = generateRandomCode();
                const payloadSensus = {
                    kode: kodeRegistrasi,
                    noKk: noKkField,
                    statusRumah: document.getElementById("status_rumah").value,
                    noRumah: document.getElementById("no_rumah").value,
                    namaPemilikKos: document.getElementById("nama_pemilik_kos").value,
                    waUtama: document.getElementById("wa_utama").value,
                    anggota: payloadAnggota
                };

                btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Mengirim Data ke Server...`;

                fetch(GOOGLE_SCRIPT_API_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payloadSensus)
                })
                .then(() => {
                    btn.innerHTML = `<i class="fas fa-cloud-arrow-up"></i> Kirim Formulir Sensus`;
                    btn.removeAttribute("disabled");
                    panggilCustomModal("sukses", "Sensus Terkirim!", "Data sensus Anda berhasil disimpan permanen di sistem cloud RT 04. Kode Pelacakan:", kodeRegistrasi);
                });
            })
            .catch(err => {
                btn.innerHTML = `<i class="fas fa-cloud-arrow-up"></i> Kirim Formulir Sensus`;
                btn.removeAttribute("disabled");
                panggilCustomModal("error", "Koneksi Terganggu", "Gagal memproses validasi data: " + err.toString());
            });
        }

        window.onload = function() { tambahWargaRow(); };
    </script>
</body>
</html>
