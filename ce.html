<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pendataan Warga RT</title>

<meta name="theme-color" content="#14b8a6">

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="ce.css">

</head>
<body>

<header class="hero">

<div class="hero-content">

<h1>🏘️ Pendataan Warga RT</h1>

<p>
Pendataan berdasarkan Kartu Keluarga
</p>

</div>

</header>

<main class="container">

<form id="wargaForm">

<!-- DATA KK -->

<section class="card">

<h2>📋 Data Kartu Keluarga</h2>

<div class="grid">

<div class="field">
<label>No KK</label>
<input type="text">
</div>

<div class="field">
<label>Kepala Keluarga</label>
<input type="text">
</div>

<div class="field full">
<label>Alamat</label>
<textarea></textarea>
</div>

<div class="field">
<label>RT</label>
<input type="number">
</div>

<div class="field">
<label>RW</label>
<input type="number">
</div>

<div class="field">
<label>No HP</label>
<input type="tel">
</div>

</div>

</section>

<!-- STATUS HUNIAN -->

<section class="card">

<h2>🏠 Status Hunian</h2>

<div class="grid">

<div class="field">
<label>Status</label>

<select id="statusHunian">

<option>Milik Sendiri</option>
<option>Keluarga / Orang Tua</option>
<option>Kontrak</option>
<option>Kos</option>
<option>Mess Toko / Perusahaan</option>
<option>Tinggal Dengan Majikan</option>
<option>Menumpang</option>

</select>

</div>

</div>

<div id="detailHunian"></div>

</section>

<!-- ANGGOTA -->

<section class="card">

<div class="title-row">

<h2>👨‍👩‍👧‍👦 Anggota Keluarga</h2>

<button
type="button"
class="add-btn"
id="addMember">

+ Tambah

</button>

</div>

<div id="members"></div>

</section>

<!-- KETERANGAN -->

<section class="card">

<h2>📝 Keterangan</h2>

<textarea></textarea>

</section>

<button
type="submit"
class="save-btn">

💾 Simpan Data

</button>

</form>

</main>

<script src="ce.js"></script>

</body>
</html>
