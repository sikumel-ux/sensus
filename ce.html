<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pendataan Warga RT</title>

<meta name="theme-color" content="#14b8a6">

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="ce.css">

</head>
<body>

<header class="hero">

    <div class="hero-content">

        <div class="hero-icon">🏘️</div>

        <h1>Pendataan Warga RT</h1>

        <p>
            Pendataan berdasarkan Kartu Keluarga
        </p>

    </div>

</header>

<main class="container">

<form id="wargaForm">

    <!-- DATA KK -->

    <section class="card">

        <h2>📋 Data Kartu Keluarga</h2>

        <div class="grid">

            <div class="field">
                <label>Nomor KK</label>
                <input
                    type="text"
                    name="no_kk"
                    maxlength="16"
                    placeholder="Masukkan Nomor KK">
            </div>

            <div class="field">
                <label>Nama Kepala Keluarga</label>
                <input
                    type="text"
                    name="kepala_keluarga"
                    placeholder="Nama Kepala Keluarga">
            </div>

            <div class="field full">
                <label>Alamat Lengkap</label>
                <textarea
                    name="alamat"
                    placeholder="Alamat lengkap"></textarea>
            </div>

        </div>

        <div class="grid-small">

            <div class="field">
                <label>RT</label>
                <input
                    type="number"
                    name="rt">
            </div>

            <div class="field">
                <label>RW</label>
                <input
                    type="number"
                    name="rw">
            </div>

            <div class="field">
                <label>Kode Pos</label>
                <input
                    type="number"
                    name="kode_pos">
            </div>

        </div>

        <div class="grid">

            <div class="field">
                <label>No HP</label>
                <input
                    type="tel"
                    name="hp">
            </div>

            <div class="field">
                <label>Status Warga</label>

                <select name="status_warga">

                    <option value="">
                        Pilih Status
                    </option>

                    <option>
                        Tetap
                    </option>

                    <option>
                        Pendatang
                    </option>

                </select>

            </div>

        </div>

    </section>

    <!-- STATUS HUNIAN -->

    <section class="card">

        <h2>🏠 Status Hunian</h2>

        <div class="grid">

            <div class="field">

                <label>Status Hunian</label>

                <select id="statusHunian">

                    <option value="">
                        Pilih Status
                    </option>

                    <option>
                        Milik Sendiri
                    </option>

                    <option>
                        Keluarga / Orang Tua
                    </option>

                    <option>
                        Kontrak
                    </option>

                    <option>
                        Kos
                    </option>

                    <option>
                        Mess Toko / Perusahaan
                    </option>

                    <option>
                        Tinggal Dengan Majikan
                    </option>

                    <option>
                        Menumpang
                    </option>

                </select>

            </div>

            <div class="field">

                <label>Tanggal Mulai Tinggal</label>

                <input type="date">

            </div>

        </div>

        <div id="detailHunian"></div>

    </section>

    <!-- DATA ANGGOTA -->

    <section class="card">

        <div class="section-header">

            <h2>👨‍👩‍👧‍👦 Anggota Keluarga</h2>

            <button
                type="button"
                id="addMember"
                class="btn-add">

                + Tambah

            </button>

        </div>

        <div id="members"></div>

    </section>

    <!-- DOKUMEN -->

    <section class="card">

        <h2>📷 Dokumen</h2>

        <div class="grid">

            <div class="field">

                <label>Foto Kartu Keluarga</label>

                <input
                    type="file"
                    accept="image/*">

            </div>

            <div class="field">

                <label>Foto KTP Kepala Keluarga</label>

                <input
                    type="file"
                    accept="image/*">

            </div>

        </div>

    </section>

    <!-- KONTAK DARURAT -->

    <section class="card">

        <h2>📞 Kontak Darurat</h2>

        <div class="grid">

            <div class="field">

                <label>Nama Kontak</label>

                <input
                    type="text">

            </div>

            <div class="field">

                <label>No HP Kontak</label>

                <input
                    type="tel">

            </div>

        </div>

    </section>

    <!-- KETERANGAN -->

    <section class="card">

        <h2>📝 Keterangan</h2>

        <textarea
            placeholder="Tambahkan keterangan bila diperlukan"></textarea>

    </section>

    <!-- TOMBOL -->

    <section class="action-area">

        <button
            type="submit"
            class="btn-save">

            💾 Simpan Data

        </button>

    </section>

</form>

</main>

<!-- TEMPLATE ANGGOTA -->

<template id="memberTemplate">

<div class="member-card">

    <div class="member-top">

        <h3>
            👤 Anggota Keluarga
        </h3>

        <button
            type="button"
            class="btn-delete">

            Hapus

        </button>

    </div>

    <div class="grid">

        <div class="field">

            <label>Nama Lengkap</label>

            <input
                type="text"
                placeholder="Nama lengkap">

        </div>

        <div class="field">

            <label>NIK</label>

            <input
                type="text"
                maxlength="16"
                placeholder="16 digit NIK">

        </div>

        <div class="field">

            <label>Hubungan Dalam Keluarga</label>

            <select>

                <option>
                    Kepala Keluarga
                </option>

                <option>
                    Istri
                </option>

                <option>
                    Anak
                </option>

                <option>
                    Orang Tua
                </option>

                <option>
                    Menantu
                </option>

                <option>
                    Cucu
                </option>

                <option>
                    Famili Lain
                </option>

            </select>

        </div>

        <div class="field">

            <label>Jenis Kelamin</label>

            <select>

                <option>
                    Laki-Laki
                </option>

                <option>
                    Perempuan
                </option>

            </select>

        </div>

        <div class="field">

            <label>Tempat Lahir</label>

            <input
                type="text">

        </div>

        <div class="field">

            <label>Tanggal Lahir</label>

            <input
                type="date">

        </div>

        <div class="field">

            <label>Agama</label>

            <select>

                <option>Islam</option>
                <option>Kristen</option>
                <option>Katolik</option>
                <option>Hindu</option>
                <option>Buddha</option>
                <option>Konghucu</option>

            </select>

        </div>

        <div class="field">

            <label>Pekerjaan</label>

            <input
                type="text">

        </div>

        <div class="field">

            <label>Status Perkawinan</label>

            <select>

                <option>Belum Kawin</option>
                <option>Kawin</option>
                <option>Cerai Hidup</option>
                <option>Cerai Mati</option>

            </select>

        </div>

        <div class="field">

            <label>No HP</label>

            <input
                type="tel">

        </div>

    </div>

</div>

</template>

<script src="ce.js"></script>

</body>
</html>
