<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pendataan Warga RT</title>

<meta name="theme-color" content="#14b8a6">

<link rel="manifest" href="manifest.json">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(180deg,#14b8a6,#0f766e);
padding:15px;
min-height:100vh;
}

.container{
max-width:800px;
margin:auto;
background:#fff;
border-radius:20px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.header{
text-align:center;
margin-bottom:20px;
}

.header h1{
color:#f97316;
font-size:28px;
}

.header p{
color:#666;
font-size:14px;
}

.section{
margin-bottom:20px;
padding:15px;
border-radius:15px;
background:#f8fafc;
border-left:6px solid #14b8a6;
}

.section h2{
font-size:18px;
margin-bottom:15px;
color:#0f766e;
}

label{
display:block;
margin-bottom:5px;
font-weight:600;
color:#444;
}

input,
select,
textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:12px;
font-size:15px;
}

textarea{
resize:vertical;
min-height:80px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#f97316;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.btn:hover{
background:#ea580c;
}

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#666;
}

.hidden{
display:none;
}

@media(max-width:600px){

.header h1{
font-size:22px;
}

.section{
padding:12px;
}

}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>Pendataan Warga RT</h1>
<p>Data berdasarkan Kartu Keluarga</p>
</div>

<form id="formWarga">

<div class="section">
<h2>Data Kartu Keluarga</h2>

<label>Nomor KK</label>
<input type="text" required>

<label>Nama Kepala Keluarga</label>
<input type="text" required>

<label>Alamat</label>
<textarea required></textarea>

<label>RT</label>
<input type="text">

<label>RW</label>
<input type="text">

<label>No. HP</label>
<input type="tel">

</div>

<div class="section">
<h2>Status Hunian</h2>

<label>Status Hunian</label>

<select id="statusHunian">

<option value="">Pilih</option>

<option>Milik Sendiri</option>

<option>Keluarga / Orang Tua</option>

<option>Kontrak</option>

<option>Kos</option>

<option>Mess Toko / Perusahaan</option>

<option>Tinggal dengan Majikan</option>

<option>Menumpang</option>

</select>

<div id="detailMajikan" class="hidden">

<label>Jenis Pekerjaan</label>

<select>
<option>ART</option>
<option>Sopir</option>
<option>Satpam</option>
<option>Penjaga Rumah</option>
<option>Babysitter</option>
<option>Perawat Lansia</option>
<option>Lainnya</option>
</select>

<label>Nama Majikan</label>
<input type="text">

<label>No HP Majikan</label>
<input type="tel">

</div>

<div id="detailMess" class="hidden">

<label>Nama Toko / Perusahaan</label>
<input type="text">

<label>Penanggung Jawab</label>
<input type="text">

<label>No HP Penanggung Jawab</label>
<input type="tel">

</div>

</div>

<div class="section">
<h2>Data Anggota Keluarga</h2>

<label>Nama Lengkap</label>
<input type="text">

<label>NIK</label>
<input type="text">

<label>Hubungan Dalam Keluarga</label>

<select>
<option>Kepala Keluarga</option>
<option>Istri</option>
<option>Anak</option>
<option>Orang Tua</option>
<option>Menantu</option>
<option>Cucu</option>
<option>Famili Lain</option>
</select>

<label>Pekerjaan</label>
<input type="text">

</div>

<div class="section">
<h2>Keterangan</h2>

<textarea></textarea>
</div>

<button class="btn" type="submit">
Simpan Data
</button>

</form>

<div class="footer">
© 2026 Pendataan Warga RT
</div>

</div>

<script>

const statusHunian =
document.getElementById('statusHunian');

const detailMajikan =
document.getElementById('detailMajikan');

const detailMess =
document.getElementById('detailMess');

statusHunian.addEventListener(
'change',
function(){

detailMajikan.classList.add('hidden');
detailMess.classList.add('hidden');

if(this.value === 'Tinggal dengan Majikan'){
detailMajikan.classList.remove('hidden');
}

if(this.value === 'Mess Toko / Perusahaan'){
detailMess.classList.remove('hidden');
}

}
);

if('serviceWorker' in navigator){
window.addEventListener('load',()=>{
navigator.serviceWorker.register('sw.js');
});
}

</script>

</body>
</html>
