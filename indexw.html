<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Sensus Warga RT 04</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        :root {
            --bg-admin: #0F172A;
            --bg-content: #F8FAFC;
            --card-bg: #FFFFFF;
            --border: #CBD5E1;
            --primary: #FF6B35;
            --primary-gradient: linear-gradient(135deg, #E0531F 0%, #FF6B35 60%);
            --teal: #0D9488;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-content); color: var(--text-main); font-size: 0.85rem; line-height: 1.6; }

        header { background: var(--bg-admin); color: white; padding: 24px 20px; text-align: center; border-bottom: 4px solid var(--primary); }
        header h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
        header p { color: #94A3B8; font-size: 0.78rem; margin-top: 4px; }

        .container { max-width: 650px; margin: 30px auto; padding: 0 20px; }
        
        .form-card { background: var(--card-bg); padding: 30px 24px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.03); }
        .form-card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; color: var(--bg-admin); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .full-width { grid-column: span 2; }

        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 4px; }
        .form-group label { font-size: 0.75rem; font-weight: 700; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.3px; }
        
        .form-input, .form-select { padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.85rem; outline: none; background: #fff; transition: all 0.2s; color: var(--text-main); }
        .form-input:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1); }

        .btn-submit { background: var(--primary-gradient); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 700; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin-top: 24px; box-shadow: 0 4px 12px rgba(224, 83, 31, 0.2); transition: all 0.2s; }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(224, 83, 31, 0.3); }
        .btn-submit:disabled { background: #94A3B8; cursor: not-allowed; box-shadow: none; }

        .file-helper { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
    </style>
</head>
<body>

    <header>
        <h1>Formulir Sensus Mandiri Warga</h1>
        <p>RT 04 Dongkelan - Silakan Isi Data Jiwa Anda Secara Benar & Valid</p>
    </header>

    <div class="container">
        <div class="form-card">
            <h2><i class="fas fa-wpforms"></i> Data Profil Jiwa</h2>
            
            <form id="formSensusWarga" onsubmit="kirimFormulirSensus(event)">
                <div class="form-grid">
                    
                    <div class="form-group">
                        <label>No. Rumah</label>
                        <input type="text" id="warga_no_rumah" class="form-input" placeholder="Contoh: 12 B" required>
                    </div>

                    <div class="form-group">
                        <label>No. Kartu Keluarga (KK)</label>
                        <input type="text" id="warga_no_kk" class="form-input" placeholder="16 Digit No KK" maxlength="16" required>
                    </div>

                    <div class="form-group full-width">
                        <label>Nama Lengkap (Sesuai KTP)</label>
                        <input type="text" id="warga_nama" class="form-input" placeholder="Masukkan nama lengkap" required>
                    </div>

                    <div class="form-group full-width">
                        <label>Nomor Induk Kependudukan (NIK)</label>
                        <input type="text" id="warga_nik" class="form-input" placeholder="16 Digit NIK KTP" maxlength="16" required>
                    </div>

                    <div class="form-group full-width">
                        <label>Tempat, Tanggal Lahir</label>
                        <input type="text" id="warga_ttl" class="form-input" placeholder="Contoh: Yogyakarta, 17 Agustus 1998" required>
                    </div>

                    <div class="form-group">
                        <label>Jenis Kelamin</label>
                        <select id="warga_jk" class="form-select" required>
                            <option value="">-- Pilih --</option>
                            <option value="Laki-laki">Laki-laki</option>
                            <option value="Perempuan">Perempuan</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Hubungan Keluarga</label>
                        <select id="warga_hubungan" class="form-select" required>
                            <option value="">-- Pilih --</option>
                            <option value="Suami">Suami</option>
                            <option value="Istri">Istri</option>
                            <option value="Anak">Anak</option>
                            <option value="Cucu">Cucu</option>
                            <option value="Mertua">Mertua</option>
                            <option value="Kos">Kos</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Status Hunian</label>
                        <select id="warga_status_rumah" class="form-select" onchange="sesuaikanFormHunian()" required>
                            <option value="">-- Pilih --</option>
                            <option value="Milik Sendiri">Milik Sendiri</option>
                            <option value="Sewa / Kontrak">Sewa / Kontrak</option>
                            <option value="Kos">Kos Mandiri</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Mode Jimpitan</label>
                        <select id="warga_jimpitan" class="form-select" required>
                            <option value="Harian">Harian (Koin Rp500)</option>
                            <option value="Bulanan">Bulanan</option>
                            <option value="-">Tidak Ikut (-)</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>No. WhatsApp Utama</label>
                        <input type="text" id="warga_wa" class="form-input" placeholder="Contoh: 081234567xxx" required>
                    </div>

                    <div class="form-group full-width" id="wrapper_nama_kos" style="display: none;">
                        <label style="color:var(--primary)">Nama Pemilik Kos</label>
                        <input type="text" id="warga_pemilik_kos" class="form-input" placeholder="Wajib diisi jika status hunian adalah Kos">
                    </div>

                    <div class="form-group full-width">
                        <label>Link Dokumen / Foto KTP</label>
                        <input type="url" id="warga_link_foto" class="form-input" placeholder="https://drive.google.com/... (atau isi '-')">
                        <div class="file-helper">Masukkan url link share dari Google Drive. Jika tidak ada, isi tanda minus (-).</div>
                    </div>

                </div>

                <button type="submit" id="btnKirim" class="btn-submit">
                    <i class="fas fa-paper-plane"></i> Kirim Data Sensus
                </button>
            </form>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_API_URL = "https://script.google.com/macros/s/AKfycby-DpvqtWpu8FEVeudZYPms_0kc7jJyQ60BwiVJ9NlIxKcBzMbse9GcbBpjnorz94_wHg/exec";

        function sesuaikanFormHunian() {
            let status = document.getElementById("warga_status_rumah").value;
            let wrapperKos = document.getElementById("wrapper_nama_kos");
            let inputPemilik = document.getElementById("warga_pemilik_kos");
            let selectJimpitan = document.getElementById("warga_jimpitan");

            if (status === "Kos") {
                wrapperKos.style.display = "flex";
                inputPemilik.required = true;
                selectJimpitan.value = "-";
            } else {
                wrapperKos.style.display = "none";
                inputPemilik.required = false;
                inputPemilik.value = "";
            }
        }

        function kirimFormulirSensus(e) {
            e.preventDefault();
            
            const btn = document.getElementById("btnKirim");
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Menyimpan ke Server...`;

            let payload = {
                aksi: "tambah",
                noKk: document.getElementById("warga_no_kk").value.trim(),
                noRumah: document.getElementById("warga_no_rumah").value.trim(),
                namaLengkap: document.getElementById("warga_nama").value.trim(),
                nik: document.getElementById("warga_nik").value.trim(),
                ttl: document.getElementById("warga_ttl").value.trim(),
                jk: document.getElementById("warga_jk").value,
                statusRumah: document.getElementById("warga_status_rumah").value,
                modeJimpitan: document.getElementById("warga_jimpitan").value,
                hubungan: document.getElementById("warga_hubungan").value,
                waUtama: document.getElementById("warga_wa").value.trim(),
                namaPemilikKos: document.getElementById("warga_pemilik_kos").value.trim() || "-",
                linkFoto: document.getElementById("warga_link_foto").value.trim() || "-"
            };

            fetch(GOOGLE_SCRIPT_API_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res_data => {
                // Mengambil kodeRegistrasi hasil buatan backend Apps Script
                let kodeReg = res_data.kodeRegistrasi || payload.nik; 
                window.location.href = `terimakasih/?id=${kodeReg}`;
            })
            .catch(err => {
                console.error(err);
                alert("Gagal mengirim data sensus. Silakan coba lagi.");
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-paper-plane"></i> Kirim Data Sensus`;
            });
        }
    </script>
</body>
</html>
