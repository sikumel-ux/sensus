<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensus RT 04</title>
    
    <!-- Google Fonts: Plus Jakarta Sans & Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">
        <div class="thank-card">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>Data Berhasil Dikirim!</h1>
            <p class="subtitle">Terimakasih, data Anda telah tersimpan di database RT 04 dengan no registrasi:</p>

            <div class="reg-code-box" id="displayKodeReg">04-XXXXXX</div>

            <div id="ringkasanData" class="data-box">
                <h3><i class="fas fa-home"></i> Informasi Hunian</h3>
                
                <div class="data-row">
                    <div class="data-label">Status Hunian</div><div>:</div><div class="data-value" id="res_status">-</div>
                </div>
                <div class="data-row">
                    <div class="data-label">No. Kartu Keluarga</div><div>:</div><div class="data-value font-mono" id="res_kk">-</div>
                </div>
                <div class="data-row">
                    <div class="data-label">No. Rumah</div><div>:</div><div class="data-value" id="res_rumah">-</div>
                </div>
                <div class="data-row">
                    <div class="data-label">No WhatsApp</div><div>:</div><div class="data-value font-mono" id="res_wa">-</div>
                </div>
                <div class="data-row">
                    <div class="data-label">Alamat Detail</div><div>:</div><div class="data-value" id="res_alamat">-</div>
                </div>

                <h3 style="margin-top: 22px; margin-bottom: 12px;"><i class="fas fa-users"></i> Daftar Anggota Jiwa Terdaftar</h3>
                <div id="containerDaftarWarga"></div>
            </div>

            <button onclick="kembaliKeFormUtama()" class="btn-back">
                <i class="fas fa-home"></i> Kembali
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
