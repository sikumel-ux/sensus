<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Admin Sensus RT 04</title>
    
    <!-- Google Fonts & Font Awesome Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        /* ==========================================
           VARIABLES & PALET WARNA LIGHT MODE COMPACT
           ========================================== */
        :root {
            --bg-app: #F8FAFC;
            --card-bg: #FFFFFF;
            --bg-input: #F1F5F9;
            --border: #E2E8F0;
            
            --primary: #FF6B35; /* Orange */
            --primary-light: rgba(255, 107, 53, 0.08);
            
            --teal: #0D9488; /* Teal */
            --teal-light: rgba(13, 148, 136, 0.08);
            
            --accent-warn: #EF4444;
            --accent-warn-light: rgba(239, 68, 68, 0.08);
            
            --text-main: #0F172A;
            --text-muted: #64748B;
            --radius-lg: 12px;
            --radius-md: 8px;
            --transition: all 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-app); color: var(--text-main); min-height: 100vh; padding: 12px; font-size: 0.8rem; }

        .admin-container { max-width: 700px; margin: 0 auto; }

        /* HEADER */
        .admin-header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); padding: 12px 16px; border-radius: var(--radius-lg);
            border: 1px solid var(--border); margin-bottom: 12px;
        }
        .header-title h1 { font-size: 1.05rem; font-weight: 800; letter-spacing: -0.3px; }
        .header-title p { color: var(--text-muted); font-size: 0.7rem; }
        
        .stats-wrapper { display: flex; gap: 8px; }
        .stat-badge {
            background: var(--bg-input); padding: 6px 10px; border-radius: var(--radius-md);
            display: flex; align-items: center; gap: 6px; font-size: 0.72rem; font-weight: 700;
        }

        /* FILTER & SEARCH BAR */
        .filter-card {
            background: var(--card-bg); border-radius: var(--radius-lg); padding: 12px;
            border: 1px solid var(--border); margin-bottom: 12px; display: flex; gap: 8px;
        }
        .search-box { flex: 1; position: relative; }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.75rem; }
        .search-box .form-control { padding-left: 32px; }
        
        .form-control {
            width: 100%; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-md);
            font-size: 0.78rem; background: var(--bg-app); outline: none; transition: var(--transition); color: var(--text-main);
        }
        .form-control:focus { border-color: var(--primary); background: #fff; }
        .filter-select { width: 120px; font-weight: 600; }

        /* TABLE CARD (NO SIDE SCROLL) */
        .table-card {
            background: var(--card-bg); border-radius: var(--radius-lg);
            border: 1px solid var(--border); overflow: hidden;
        }
        .admin-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.78rem; }
        .admin-table th, .admin-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
        .admin-table th { background: #F1F5F9; font-weight: 700; color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; }
        .admin-table tbody tr:hover { background-color: #F8FAFC; }

        /* Clickable Code Link */
        .code-link { color: var(--primary); font-weight: 800; cursor: pointer; text-decoration: underline; display: inline-flex; align-items: center; gap: 4px; }
        .code-link:hover { color: #E0531F; }

        /* Badges & Buttons */
        .status-badge { padding: 3px 6px; border-radius: 4px; font-size: 0.68rem; font-weight: 700; display: inline-flex; align-items: center; gap: 3px; }
        .status-pending { background: var(--primary-light); color: var(--primary); }
        .status-approved { background: var(--teal-light); color: var(--teal); }

        .btn-table {
            padding: 6px 10px; border: none; border-radius: 6px; font-size: 0.72rem; font-weight: 700;
            cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-approve { background: var(--teal); color: white; width: 100%; }
        .btn-approve:hover { background: #0b7a70; }
        .btn-delete { background: var(--accent-warn-light); color: var(--accent-warn); padding: 6px 8px; }
        .btn-delete:hover { background: var(--accent-warn); color: white; }

        /* ==========================================
           POP-UP MODAL SYSTEM (POP-UP DATA)
           ========================================== */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            z-index: 9999; justify-content: center; align-items: center; padding: 12px; 
        }
        .modal-box { 
            background: #fff; border-radius: var(--radius-lg); padding: 16px; 
            max-width: 460px; width: 100%; max-height: 85vh; overflow-y: auto;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.15); border: 1px solid var(--border);
            animation: modalPop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.15);
        }
        @keyframes modalPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 12px; }
        .modal-header h3 { font-size: 0.95rem; font-weight: 800; color: var(--text-main); }
        .btn-close-modal { background: none; border: none; font-size: 1.1rem; color: var(--text-muted); cursor: pointer; }

        /* Modal Info Grid */
        .info-row { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; text-align: left; }
        .info-row label { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .info-row p { font-size: 0.8rem; font-weight: 600; color: var(--text-main); background: var(--bg-app); padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); }

        /* Warga Mini Card di Pop-up */
        .warga-popup-card { background: var(--bg-app); border: 1px solid var(--border); padding: 8px 12px; border-radius: var(--radius-md); margin-bottom: 8px; text-align: left; }
        .warga-popup-card .card-head { display: flex; justify-content: space-between; font-weight: 700; font-size: 0.78rem; margin-bottom: 4px; color: var(--primary); }
        .warga-popup-card .badge-status-warga { font-size: 0.65rem; background: var(--bg-input); padding: 1px 5px; border-radius: 4px; color: var(--text-muted); }
        .warga-popup-card p { font-size: 0.75rem; color: var(--text-main); margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="admin-container">
        
        <!-- HEADER -->
        <header class="admin-header">
            <div class="header-title">
                <h1>Panel Validasi RT 04</h1>
                <p>Klik kode unik untuk melihat detail data</p>
            </div>
            <div class="stats-wrapper">
                <div class="stat-badge" style="color: var(--primary); background: var(--primary-light);">
                    <span id="statPending">0</span> P
                </div>
                <div class="stat-badge" style="color: var(--teal); background: var(--teal-light);">
                    <span id="statApproved">0</span> S
                </div>
            </div>
        </header>

        <!-- SEARCH & FILTER -->
        <section class="filter-card">
            <div class="search-box">
                <i class="fas fa-magnifying-glass"></i>
                <input type="text" id="adminSearchInput" class="form-control" placeholder="Cari No. Rumah, Nama, atau Kode..." oninput="renderTabelAdmin()">
            </div>
            <select id="filterStatusSelect" class="form-control filter-select" onchange="renderTabelAdmin()">
                <option value="Semua">Semua</option>
                <option value="Pending">Pending</option>
                <option value="Approved">Sah</option>
            </select>
        </section>

        <!-- TABLE DATA (COMPACT & NO SIDE-SCROLL) -->
        <main class="table-card">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Kode</th>
                        <th>No. Rmh</th>
                        <th>Jiwa</th>
                        <th>Status</th>
                        <th style="width: 50px; text-align: center;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    <tr>
                        <td colspan="5" style="text-align:center; padding: 25px; color: var(--text-muted);">
                            <i class="fas fa-spinner fa-spin" style="margin-bottom:5px; display:block;"></i>
                            Loading Firebase...
                        </td>
                    </tr>
                </tbody>
            </table>
        </main>

    </div>

    <!-- ==========================================
       POP-UP 1: MODAL DETAIL DATA WARGA
       ========================================== -->
    <div id="detailModal" class="modal-overlay" onclick="if(event.target == this) tutupDetailModal()">
        <div class="modal-box">
            <div class="modal-header">
                <h3><i class="fas fa-folder-open" style="color: var(--primary);"></i> Detail Berkas Sensus</h3>
                <button class="btn-close-modal" onclick="tutupDetailModal()">&times;</button>
            </div>
            <div id="modalDetailContent"></div>
        </div>
    </div>

    <!-- POP-UP 2: MODAL KONFIRMASI HAPUS -->
    <div id="deleteModal" class="modal-overlay" onclick="if(event.target == this) tutupDeleteModal()">
        <div class="modal-box" style="max-width: 320px; text-align: center; padding: 20px;">
            <i class="fas fa-trash-can" style="font-size: 2rem; color: var(--accent-warn); margin-bottom: 10px; display: inline-block;"></i>
            <h3 style="font-size:0.95rem; margin-bottom:6px;">Hapus Data Sensus?</h3>
            <p style="font-size:0.75rem; color: var(--text-muted); margin-bottom:15px;">Data di Firebase akan terhapus secara permanen.</p>
            <div style="display: flex; gap: 8px; justify-content: center;">
                <button class="btn-table" id="btnConfirmDelete" style="background: var(--accent-warn); color: white; padding: 8px 16px;">Ya, Hapus</button>
                <button class="btn-table" style="background: var(--bg-input); color: var(--text-main); padding: 8px 16px;" onclick="tutupDeleteModal()">Batal</button>
            </div>
        </div>
    </div>

    <!-- SDK FIREBASE COMPAT -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZ31_bLqBiHY6VqHSza2qMuZqesp9-Cgg",
            authDomain: "sensus04.firebaseapp.com",
            databaseURL: "https://sensus04-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sensus04",
            storageBucket: "sensus04.firebasestorage.app",
            messagingSenderId: "538090009079",
            appId: "1:538090009079:web:932a4a812dd6de5fabfef2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const sensusRef = db.ref('sensus_warga');

        let dataSensusMaster = {};
        let targetDeleteKey = null;

        sensusRef.on('value', (snapshot) => {
            if(snapshot.exists()) {
                dataSensusMaster = snapshot.val();
                hitungDanUpdateStats();
                renderTabelAdmin();
            } else {
                dataSensusMaster = {};
                document.getElementById("adminTableBody").innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 20px; color: var(--text-muted);">Database kosong.</td></tr>`;
                hitungDanUpdateStats();
            }
        });

        function hitungDanUpdateStats() {
            let pending = 0; let approved = 0;
            Object.keys(dataSensusMaster).forEach(key => {
                if(dataSensusMaster[key].status === "Pending") pending++;
                else approved++;
            });
            document.getElementById("statPending").innerText = pending;
            document.getElementById("statApproved").innerText = approved;
        }

        function renderTabelAdmin() {
            const tbody = document.getElementById("adminTableBody");
            const kataKunci = document.getElementById("adminSearchInput").value.trim().toLowerCase();
            const filterStatus = document.getElementById("filterStatusSelect").value;
            
            tbody.innerHTML = "";
            let adaDataTampil = false;

            Object.keys(dataSensusMaster).forEach(key => {
                const item = dataSensusMaster[key];
                
                if(filterStatus === "Pending" && item.status !== "Pending") return;
                if(filterStatus === "Approved" && item.status !== "Approved") return;

                const cocokKode = item.kode.toLowerCase().includes(kataKunci);
                const cocokNoRumah = item.noRumah.toLowerCase().includes(kataKunci);
                let cocokNamaAnggota = false;
                
                if (item.anggota && Array.isArray(item.anggota)) {
                    cocokNamaAnggota = item.anggota.some(w => w.nama.toLowerCase().includes(kataKunci));
                }

                if(kataKunci !== "" && !cocokKode && !cocokNoRumah && !cocokNamaAnggota) return;

                adaDataTampil = true;
                const badgeClass = item.status === "Pending" ? "status-pending" : "status-approved";
                
                tbody.innerHTML += `
                    <tr>
                        <td><span class="code-link" onclick="bukaDetailModal('${item.kode}')">${item.kode}</span></td>
                        <td style="font-weight:600;">No. ${item.noRumah}</td>
                        <td><b>${item.jumlahJiwa}</b> Jiwa</td>
                        <td><span class="status-badge ${badgeClass}">${item.status === 'Pending' ? 'Pending' : 'Sah'}</span></td>
                        <td style="text-align: center;">
                            <button class="btn-table btn-delete" onclick="bukaDeleteModal('${item.kode}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });

            if(!adaDataTampil) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 20px; color: var(--text-muted);">Tidak ditemukan data.</td></tr>`;
            }
        }

        // ==========================================
        // DYNAMIC POP-UP DATA GENERATOR
        // ==========================================
        function bukaDetailModal(kode) {
            const data = dataSensusMaster[kode];
            if(!data) return;

            let listWargaHtml = "";
            if(data.anggota && Array.isArray(data.anggota)) {
                data.anggota.forEach(w => {
                    listWargaHtml += `
                        <div class="warga-popup-card">
                            <div class="card-head">
                                <span>${w.nama}</span>
                                <span class="badge-status-warga">${w.status}</span>
                            </div>
                            <p><b>NIK:</b> <code>${w.nik}</code></p>
                            ${w.fileUploaded !== "Tidak Perlu" ? `<p style="color:var(--teal); font-weight:700; font-size:0.7rem;"><i class="fas fa-paperclip"></i> Dokumen KTP Terlampir</p>` : ''}
                        </div>
                    `;
                });
            }

            const content = `
                <div class="info-row"><label>Status Kepemilikan Hunian</label><p style="color:var(--primary);">${data.statusRumah}</p></div>
                <div class="info-row"><label>Nomor Rumah</label><p>Rumah No. ${data.noRumah}</p></div>
                <div class="info-row"><label>Kontak WhatsApp Utama</label><p><a href="https://wa.me/${data.waUtama}" target="_blank" style="color:inherit; text-decoration:none;"><i class="fab fa-whatsapp" style="color:#25D366"></i> ${data.waUtama}</a></p></div>
                <div class="info-row"><label>Detail Alamat Rumah</label><p>${data.alamat}</p></div>
                
                <div style="margin:12px 0 6px 0; font-size:0.7rem; font-weight:800; color:var(--text-muted); text-transform:uppercase; border-bottom:1px solid var(--border); padding-bottom:4px;">Daftar Anggota Keluarga (${data.jumlahJiwa} Jiwa)</div>
                <div style="max-height: 220px; overflow-y:auto; padding-right:2px;">
                    ${listWargaHtml}
                </div>

                ${data.status === "Pending" ? `
                    <button class="btn-table btn-approve" style="margin-top:14px; padding:10px;" onclick="setujuiBerkas('${data.kode}')"><i class="fas fa-check"></i> Sahkan & Setujui Data ini</button>
                ` : `
                    <div style="margin-top:14px; background:var(--teal-light); color:var(--teal); text-align:center; padding:8px; border-radius:6px; font-weight:700; font-size:0.75rem;"><i class="fas fa-circle-check"></i> Berkas Sudah Sah / Disetujui</div>
                `}
            `;

            document.getElementById("modalDetailContent").innerHTML = content;
            document.getElementById("detailModal").style.display = "flex";
        }

        function tutupDetailModal() {
            document.getElementById("detailModal").style.display = "none";
        }

        function setujuiBerkas(kode) {
            sensusRef.child(kode).update({ status: "Approved" })[span_0](start_span)[span_0](end_span)
            .then(() => {
                tutupDetailModal();
            })
            .catch(err => alert("Gagal mengubah status: " + err.message));
        }

        function bukaDeleteModal(kode) {
            targetDeleteKey = kode;
            document.getElementById("deleteModal").style.display = "flex";
        }

        function tutupDeleteModal() {
            document.getElementById("deleteModal").style.display = "none";
            targetDeleteKey = null;
        }

        document.getElementById("btnConfirmDelete").addEventListener("click", function() {
            if(targetDeleteKey) {
                sensusRef.child(targetDeleteKey).remove()
                .then(() => {
                    tutupDeleteModal();
                })
                .catch(err => {
                    alert("Gagal menghapus: " + err.message);
                    tutupDeleteModal();
                });
            }
        });
    </script>
</body>
</html>
