<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sensus RT 04 Digital App v4.6 (Light)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        :root {
            --bg-app: #F8FAFC;
            --card-bg: #FFFFFF;
            --bg-input: #F1F5F9;
            --border: #E2E8F0;
            --primary: #FF6B35;
            --primary-light: rgba(255, 107, 53, 0.08);
            --primary-gradient: linear-gradient(135deg, #E0531F 0%, #FF6B35 60%, #FF8557 100%);
            --teal: #0D9488;
            --teal-light: rgba(13, 148, 136, 0.1);
            --accent-warn: #EF4444;
            --accent-warn-light: rgba(239, 68, 68, 0.1);
            --text-main: #0F172A;
            --text-muted: #64748B;
            --radius-lg: 20px;
            --radius-md: 12px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-app); color: var(--text-main); min-height: 100vh; padding-bottom: 80px; font-size: 0.85rem; }

        .app-header {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            color: var(--text-main); padding: 25px 20px; border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg);
            border-bottom: 1px solid var(--border); text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        .app-header .header-logo {
            width: 50px; height: 50px; background: var(--primary-light); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; margin: 0 auto 10px auto; border: 1px solid rgba(255, 107, 53, 0.2); color: var(--primary);
        }
        .app-header h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px; }
        .app-header p { color: var(--text-muted); font-size: 0.75rem; margin-top: 2px; }

        .app-container { max-width: 650px; margin: -10px auto 0 auto; padding: 0 12px; }
        .app-page { display: none; animation: fadeIn 0.3s ease forwards; }
        .app-page.active { display: block; }

        .app-card {
            background: var(--card-bg); border-radius: var(--radius-lg); padding: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04); border: 1px solid var(--border); margin-bottom: 16px;
        }

        .card-title-group {
            display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 16px;
        }
        .card-title-group .step-icon {
            background: var(--primary-light); color: var(--primary); width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem;
        }
        .card-title-group h3 { font-size: 0.95rem; font-weight: 700; color: var(--text-main); }

        .form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 0.68rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        
        .form-control {
            width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-md);
            font-size: 0.85rem; background: #fff; outline: none; transition: var(--transition); color: var(--text-main);
        }
        .form-control:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px var(--primary-light); }

        .info-note { background: var(--primary-light); border-left: 4px solid var(--primary); padding: 10px; border-radius: 6px; font-size: 0.78rem; color: var(--text-main); margin-bottom: 12px; }
        .warga-item-box { background: var(--bg-app); border: 1px dashed var(--border); border-radius: var(--radius-md); padding: 16px; margin-bottom: 12px; position: relative; }
        .btn-delete-row { position: absolute; right: 12px; top: 12px; background: var(--accent-warn-light); color: var(--accent-warn); border: none; padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; cursor: pointer; }

        .upload-box-wrapper { display: none; margin-top: 4px; }
        .file-zone { border: 2px dashed var(--border); background: #fff; padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; transition: var(--transition); }
        .file-zone:hover { border-color: var(--primary); background: var(--primary-light); }
        .file-zone i { font-size: 1.2rem; color: var(--text-muted); }

        .error-hint { color: var(--accent-warn); font-size: 0.7rem; font-weight: 600; display: none; margin-top: 1px; }

        .btn-action { width: 100%; padding: 12px; border: none; border-radius: var(--radius-md); font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary-gradient); color: white; box-shadow: 0 4px 14px rgba(255, 107, 53, 0.3); }
        .btn-primary:opacity { opacity: 0.9; }
        .btn-outline { background: transparent; color: var(--primary); border: 2px dashed var(--primary); margin-top: 8px; }
        .btn-outline:hover { background: var(--primary-light); }

        .review-value { padding: 8px 12px; background: var(--bg-app); border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-main); }
        .review-badge { display: inline-block; padding: 2px 6px; background: var(--primary-light); border-radius: 4px; font-size: 0.65rem; font-weight: 700; color: var(--primary); }

        .search-container { display: flex; gap: 8px; margin-bottom: 16px; }
        .table-responsive { width: 100%; overflow-x: auto; border-radius: var(--radius-md); border: 1px solid var(--border); }
        .app-table { width: 100%; border-collapse: collapse; background: #fff; text-align: left; font-size: 0.8rem; }
        .app-table th, .app-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
        .app-table th { background: var(--bg-input); font-weight: 700; color: var(--text-muted); }
        .status-badge { padding: 3px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
        .status-pending { background: var(--primary-light); color: var(--primary); }
        .status-approved { background: var(--teal-light); color: var(--teal); }

        .custom-alert-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.3); backdrop-filter: blur(8px); z-index: 9999; justify-content: center; align-items: center; padding: 16px; }
        .alert-box { background: #fff; border-radius: var(--radius-lg); padding: 25px 20px; max-width: 400px; width: 100%; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .code-display { background: var(--primary-light); border: 2px dashed var(--primary); padding: 10px; font-size: 1.25rem; font-weight: 800; color: var(--primary); letter-spacing: 2px; border-radius: var(--radius-md); margin-bottom: 20px; }
        .btn-modal-close { background: var(--text-main); color: white; border: none; padding: 12px; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; width: 100%; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: #ffffff; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 -4px 20px rgba(0,0,0,0.03); }
        .nav-link { display: flex; flex-direction: column; align-items: center; gap: 2px; color: var(--text-muted); text-decoration: none; font-size: 0.7rem; font-weight: 600; width: 50%; text-align: center; }
        .nav-link i { font-size: 1.1rem; }
        .nav-link.active { color: var(--primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-logo"><i class="fas fa-users-viewfinder"></i></div>
        <h1>Sensus RT 04 Digital</h1>
        <p>Sistem Validasi Kependudukan Komunitas</p>
    </header>

    <div class="app-container">

        <!-- PAGE 1: FORM PENGISIAN DATA -->
        <div id="pageForm" class="app-page active">
            <form id="mainSensusForm" onsubmit="prosesReviewSensus(event)">
                <div class="app-card">
                    <div class="card-title-group">
                        <div class="step-icon">1</div>
                        <h3>Data Properti & Kontak</h3>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Status Hunian</label>
                            <select id="status_rumah" class="form-control" onchange="sinkronisasiKategoriWargaAll()">
                                <option value="Milik Sendiri">Milik Sendiri / Keluarga Tetap</option>
                                <option value="Sewa / Kontrak">Sewa / Kontrak Rumah</option>
                                <option value="Kos">Kost Mandiri</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Nomor Rumah</label>
                            <input type="text" id="no_rumah" class="form-control" placeholder="Contoh: No. 12" required>
                        </div>
                        <div class="form-group">
                            <label>No. WhatsApp Utama (Penanggung Jawab)</label>
                            <input type="number" id="wa_utama" class="form-control" placeholder="Contoh: 081234567xxx" required>
                        </div>
                        <div class="form-group">
                            <label>Alamat / Detail Gang</label>
                            <input type="text" id="alamat_rumah" class="form-control" placeholder="Contoh: Dongkelan RT 04" required>
                        </div>
                    </div>
                </div>

                <div class="app-card">
                    <div class="card-title-group">
                        <div class="step-icon">2</div>
                        <h3>Daftar Anggota Penghuni</h3>
                    </div>
                    <div id="infoNoteStatus" class="info-note">
                        <i class="fas fa-info-circle"></i> Memasukkan data Kepala Keluarga & Anggota inti rumah.
                    </div>
                    <div id="wargaListContainer"></div>
                    <button type="button" id="btnTambahAnggota" class="btn-action btn-outline" onclick="tambahWargaRow()">
                        <i class="fas fa-user-plus"></i> Tambah Anggota Jiwa
                    </button>
                </div>
                <button type="submit" class="btn-action btn-primary"><i class="fas fa-eye"></i> Review Data Sensus</button>
            </form>
        </div>

        <!-- PAGE 2: REVIEW MODE -->
        <div id="pageReview" class="app-page">
            <div class="app-card" style="border-top: 4px solid var(--primary);">
                <div class="card-title-group">
                    <div class="step-icon"><i class="fas fa-file-invoice"></i></div>
                    <h3>Review Ringkasan Sensus</h3>
                </div>
                <div id="reviewContentHtml" class="form-grid"></div>
                <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 8px;">
                    <button class="btn-action btn-primary" onclick="simpanFinalKolektif()"><i class="fas fa-cloud-arrow-up"></i> Konfirmasi & Kirim Data</button>
                    <button type="button" class="btn-action" style="background:var(--bg-input); color:var(--text-main); border: 1px solid var(--border);" onclick="kembaliEditForm()"><i class="fas fa-pen-to-square"></i> Edit Kembali Data</button>
                </div>
            </div>
        </div>

        <!-- PAGE 3: STATUS VALIDASI -->
        <div id="pageStatus" class="app-page">
            <div class="app-card">
                <div class="card-title-group">
                    <div class="step-icon"><i class="fas fa-magnifying-glass"></i></div>
                    <h3>Cek Validasi Berkas</h3>
                </div>
                <div class="search-container">
                    <input type="text" id="inputCariKode" class="form-control" placeholder="Masukkan Kode Unik (RT04-XXXX)">
                    <button class="btn-action btn-primary" style="width: auto; padding: 0 16px;" onclick="cariStatusSensus()">Cari</button>
                </div>
                <div class="table-responsive">
                    <table class="app-table">
                        <thead>
                            <tr>
                                <th>Kode Unik</th>
                                <th>No. Rumah</th>
                                <th>Jiwa</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="tabelStatusSensus"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-link active" id="navForm" onclick="switchPage('pageForm', this)"><i class="fas fa-file-signature"></i>Isi Sensus</a>
        <a href="#" class="nav-link" id="navStatus" onclick="switchPage('pageStatus', this)"><i class="fas fa-square-poll-horizontal"></i>Cek Status</a>
    </nav>

    <div id="customAlertOverlay" class="custom-alert-overlay">
        <div class="alert-box" id="alertBoxContent"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZ31_bLqBiHY6VqHSza2qMuZqesp9-Cgg",
            authDomain: "sensus04.firebaseapp.com",
            databaseURL: "https://sensus04-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sensus04",
            storageBucket: "sensus04.firebasestorage.app",
            messagingSenderId: "538090009079",
            appId: "1:538090009079:web:932a4a812dd6de5fabfef2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const sensusRef = db.ref('sensus_warga');

        let rowCount = 0;
        let temporarySubmissionData = null;
        let databaseSensusLocal = [];

        sensusRef.on('value', (snapshot) => {
            databaseSensusLocal = [];
            if(snapshot.exists()) {
                const data = snapshot.val();
                Object.keys(data).forEach(key => databaseSensusLocal.push(data[key]));
            }
        });

        function switchPage(pageId, element) {
            document.querySelectorAll('.app-page').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).style.display = 'block';
            if(element) element.classList.add('active');
            if(pageId === 'pageStatus') {
                document.getElementById("inputCariKode").value = "";
                resetTabelKeKeadaanAwal();
            }
        }

        function resetTabelKeKeadaanAwal() {
            document.getElementById("tabelStatusSensus").innerHTML = `
                <tr><td colspan="4" style="text-align:center; color:var(--text-muted); padding: 20px;">Masukkan Kode Unik Pelacakan.</td></tr>`;
        }

        function cariStatusSensus() {
            const kataKunci = document.getElementById("inputCariKode").value.trim().toUpperCase();
            const tbody = document.getElementById("tabelStatusSensus");
            if(kataKunci === "") { resetTabelKeKeadaanAwal(); return; }

            const hasilCari = databaseSensusLocal.filter(d => d.kode === kataKunci);
            tbody.innerHTML = "";

            if(hasilCari.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--accent-warn); padding: 20px; font-weight:600;">Kode tidak terdaftar!</td></tr>`;
                return;
            }

            hasilCari.forEach(item => {
                const badgeClass = item.status === "Pending" ? "status-pending" : "status-approved";
                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight:700; color:var(--primary);">${item.kode}</td>
                        <td>No. ${item.noRumah}</td>
                        <td>${item.jumlahJiwa} Jiwa</td>
                        <td><span class="status-badge ${badgeClass}">${item.status}</span></td>
                    </tr>`;
            });
        }

        function sinkronisasiKategoriWargaAll() {
            const statusRumah = document.getElementById("status_rumah").value;
            const container = document.getElementById("wargaListContainer");
            container.innerHTML = ""; rowCount = 0;
            tambahWargaRow();
        }

        function tambahWargaRow() {
            rowCount++;
            const container = document.getElementById("wargaListContainer");
            const statusRumah = document.getElementById("status_rumah").value;
            const row = document.createElement("div");
            row.className = "warga-item-box";
            row.id = `wargaRow_${rowCount}`;
            
            let selectOptionsHtml = (statusRumah === "Kos") ? `<option value="Anak Kos">Anak Kos</option>` :
                                    (statusRumah === "Sewa / Kontrak") ? `<option value="Kontrakan">Penyewa Rumah</option><option value="ART/Sopir">ART Tinggal Dalam</option>` :
                                    `<option value="Kepala Keluarga">Kepala Keluarga</option><option value="Istri">Istri</option><option value="Anak">Anak</option><option value="Orang Tua">Orang Tua</option>`;

            row.innerHTML = `
                ${(statusRumah === "Kos") ? '' : `<button type="button" class="btn-delete-row" onclick="hapusWargaRow(${rowCount})">Hapus</button>`}
                <div class="form-grid">
                    <div class="form-row-2">
                        <div class="form-group"><label>Nama Lengkap</label><input type="text" class="form-control input-nama" required></div>
                        <div class="form-group">
                            <label>NIK (16 Digit)</label>
                            <input type="text" class="form-control input-nik" inputmode="numeric" maxlength="16" oninput="this.value = this.value.replace(/[^0-9]/g, ''); cekPanjangNikLive(this, ${rowCount});" required>
                            <div id="errorNik_${rowCount}" class="error-hint">NIK wajib 16 angka!</div>
                        </div>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group"><label>Tempat Lahir</label><input type="text" class="form-control input-tempat-lahir" required></div>
                        <div class="form-group"><label>Tanggal Lahir</label><input type="date" class="form-control input-tanggal-lahir" required></div>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label>Jenis Kelamin</label>
                            <select class="form-control input-jk">
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Agama</label>
                            <select class="form-control input-agama">
                                <option value="Islam">Islam</option><option value="Kristen">Kristen</option><option value="Katolik">Katolik</option><option value="Hindu">Hindu</option><option value="Budha">Budha</option><option value="Konghucu">Konghucu</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group"><label>Pekerjaan</label><input type="text" class="form-control input-pekerjaan" placeholder="Contoh: Karyawan, Mahasiswa" required></div>
                        <div class="form-group">
                            <label>Hubungan Keluarga</label>
                            <select class="form-control input-status" onchange="evaluasiKewajibanKtp(this, ${rowCount})">${selectOptionsHtml}</select>
                        </div>
                    </div>
                    <div class="form-group upload-box-wrapper" id="uploadWrapper_${rowCount}">
                        <label style="color:var(--primary)">Berkas Wajib KTP</label>
                        <div class="file-zone" onclick="document.getElementById('file_${rowCount}').click()">
                            <i class="fas fa-id-card"></i>
                            <p id="fileNameLabel_${rowCount}" style="font-size:0.75rem;">Upload Foto KTP</p>
                            <input type="file" id="file_${rowCount}" class="input-file" accept="image/*" style="display:none;" onchange="fileChanged(this, ${rowCount})">
                        </div>
                    </div>
                </div>`;
            container.appendChild(row);
            evaluasiKewajibanKtp(row.querySelector(".input-status"), rowCount);
        }

        function cekPanjangNikLive(input, id) {
            document.getElementById(`errorNik_${id}`).style.display = (input.value.length > 0 && input.value.length < 16) ? "block" : "none";
        }
        function hapusWargaRow(id) { const row = document.getElementById(`wargaRow_${id}`); if (row) row.remove(); }
        function fileChanged(input, id) { document.getElementById(`fileNameLabel_${id}`).innerText = input.files[0] ? `📄 ${input.files[0].name}` : "Upload Foto KTP"; }

        function evaluasiKewajibanKtp(select, id) {
            const wrapper = document.getElementById(`uploadWrapper_${id}`);
            const inputNode = document.getElementById(`file_${id}`);
            if(select.value === "Anak Kos" || select.value === "Kontrakan" || select.value === "ART/Sopir") {
                wrapper.style.display = "block"; inputNode.setAttribute("required", "required");
            } else {
                wrapper.style.display = "none"; inputNode.removeAttribute("required"); inputNode.value = "";
            }
        }

        function prosesReviewSensus(e) {
            e.preventDefault();
            const rows = document.querySelectorAll(".warga-item-box");
            if(rows.length === 0) { alert("Isi minimal 1 data warga!"); return; }

            let validasiLolos = true;
            let kumpulanNik = [];

            for (let row of rows) {
                const nik = row.querySelector(".input-nik").value.trim();
                if (nik.length !== 16) { alert("Ada NIK yang belum 16 digit!"); validasiLolos = false; break; }
                if (kumpulanNik.includes(nik)) { alert("Ada NIK ganda di form ini!"); validasiLolos = false; break; }
                kumpulanNik.push(nik);

                let dabelDb = databaseSensusLocal.some(d => d.anggota && d.anggota.some(w => w.nik === nik));
                if(dabelDb) { alert(`NIK ${nik} sudah pernah terdaftar di database RT 04!`); validasiLolos = false; break; }
            }

            if(!validasiLolos) return;

            temporarySubmissionData = {
                noRumah: document.getElementById("no_rumah").value,
                statusRumah: document.getElementById("status_rumah").value,
                waUtama: document.getElementById("wa_utama").value,
                alamat: document.getElementById("alamat_rumah").value,
                anggota: []
            };

            rows.forEach(row => {
                temporarySubmissionData.anggota.push({
                    nama: row.querySelector(".input-nama").value,
                    nik: row.querySelector(".input-nik").value,
                    tempatLahir: row.querySelector(".input-tempat-lahir").value,
                    tanggalLahir: row.querySelector(".input-tanggal-lahir").value,
                    jk: row.querySelector(".input-jk").value,
                    agama: row.querySelector(".input-agama").value,
                    pekerjaan: row.querySelector(".input-pekerjaan").value,
                    status: row.querySelector(".input-status").value,
                    fileUploaded: row.querySelector(".input-file").files[0] ? row.querySelector(".input-file").files[0].name : "Tidak Perlu"
                });
            });

            let htmlReview = `
                <div class="form-group"><label>Status Hunian</label><div class="review-value">${temporarySubmissionData.statusRumah}</div></div>
                <div class="form-group"><label>No Rumah & Kontak</label><div class="review-value">No. ${temporarySubmissionData.noRumah} / WA: ${temporarySubmissionData.waUtama}</div></div>
                <div><h4 style="font-size:0.8rem; color:var(--text-muted); border-bottom:1px solid var(--border); padding-bottom:4px;">ANGGOTA JIWA:</h4></div>
            `;

            temporarySubmissionData.anggota.forEach((w, i) => {
                htmlReview += `
                    <div class="warga-item-box" style="border-style:solid; background:#fff;">
                        <div style="font-weight:700; color:var(--primary); margin-bottom:4px;">#${i+1} ${w.nama} <span class="review-badge">${w.status}</span></div>
                        <p style="font-size:0.75rem; color:var(--text-muted);">NIK: ${w.nik} | TTL: ${w.tempatLahir}, ${w.tanggalLahir} | Pekerjaan: ${w.pekerjaan}</p>
                    </div>`;
            });

            document.getElementById("reviewContentHtml").innerHTML = htmlReview;
            document.getElementById("pageForm").style.display = "none";
            document.getElementById("pageReview").style.display = "block";
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function kembaliEditForm() {
            document.getElementById("pageReview").style.display = "none";
            document.getElementById("pageForm").style.display = "block";
            
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById("navForm").classList.add('active');
            
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function simpanFinalKolektif() {
            const karakter = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let kode = "";
            for (let i = 0; i < 4; i++) { kode += karakter.charAt(Math.floor(Math.random() * karakter.length)); }
            const kodeUnik = `RT04-${kode}`;

            db.ref(`sensus_warga/${kodeUnik}`).set({
                kode: kodeUnik,
                noRumah: temporarySubmissionData.noRumah,
                statusRumah: temporarySubmissionData.statusRumah,
                waUtama: temporarySubmissionData.waUtama,
                alamat: temporarySubmissionData.alamat,
                jumlahJiwa: temporarySubmissionData.anggota.length,
                status: "Pending",
                anggota: temporarySubmissionData.anggota
            })[span_0](start_span)[span_0](end_span)
            .then(() => {
                document.getElementById("alertBoxContent").innerHTML = `
                    <h3>Pendaftaran Berhasil!</h3><p style="margin:10px 0;">Catat kode unik pelacakan status Anda:</p>
                    <div class="code-display">${kodeUnik}</div>
                    <button class="btn-modal-close" onclick="tutupAlertDanReset()">Ke Status Validasi</button>`;
                document.getElementById("customAlertOverlay").style.display = "flex";
            });
        }

        function tutupAlertDanReset() {
            document.getElementById("customAlertOverlay").style.display = "none";
            document.getElementById("mainSensusForm").reset();
            document.getElementById("wargaListContainer").innerHTML = ""; rowCount = 0;
            tambahWargaRow();
            switchPage('pageStatus', document.getElementById("navStatus"));
        }

        window.onload = function() { tambahWargaRow(); };
    </script>
</body>
</html>
