<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Sensus RT 04 Digital</title>
    
    <!-- Google Fonts & Font Awesome Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <!-- Link CSS Utama -->
    <link rel="stylesheet" href="style.css">
    
    
</head>
<body>

    <nav class="admin-nav">
        <div class="admin-brand"><i class="fas fa-shield-halved"></i> Panel Pengurus RT 04</div>
        <span class="review-badge" style="background:var(--primary-light); color:var(--primary)"><i class="fas fa-circle" style="font-size:8px; color:#2ecc71;"></i> Real-time Cloud</span>
    </nav>

    <div class="app-container" style="max-width: 900px; margin: 0 auto;">
        
        <!-- RINGKASAN DATA STATISTIK -->
        <div class="stats-grid">
            <div class="stat-box">
                <h4>Total Berkas</h4>
                <div class="stat-num" id="statTotal">0</div>
            </div>
            <div class="stat-box" style="border-left: 4px solid #f59e0b;">
                <h4>Pending</h4>
                <div class="stat-num" id="statPending" style="color: #d97706;">0</div>
            </div>
            <div class="stat-box" style="border-left: 4px solid #2ecc71;">
                <h4>Approved</h4>
                <div class="stat-num" id="statApproved" style="color: #1e7e34;">0</div>
            </div>
        </div>

        <!-- DAFTAR MASUK SENSUS -->
        <div class="app-card">
            <div class="card-title-group" style="margin-bottom: 15px;">
                <div class="step-icon"><i class="fas fa-list-check"></i></div>
                <h3>Daftar Berkas Masuk Sensus Warga</h3>
            </div>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px;"><i class="fas fa-mouse-pointer"></i> Klik pada baris tabel untuk melihat detail anggota keluarga & memvalidasi.</p>

            <div class="table-responsive">
                <table class="app-table">
                    <thead>
                        <tr>
                            <th>Kode</th>
                            <th>No. Rumah</th>
                            <th>Status Hunian</th>
                            <th>Jiwa</th>
                            <th>Status Verifikasi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelAdminSensus">
                        <tr>
                            <td colspan="5" style="text-align:center; padding:30px; color:var(--text-muted);">
                                <i class="fas fa-spinner fa-spin"></i> Menghubungkan ke Firebase...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- UNIFIED CUSTOM ALERT / DETAIL MODAL -->
    <div id="customAlertOverlay" class="custom-alert-overlay">
        <div class="alert-box modal-detail-box" id="alertBoxContent"></div>
    </div>

    <!-- PANGGIL SCRIPT UTAMA ADMIN -->
        <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script src="admin.js"></script>
</body>

</html>
