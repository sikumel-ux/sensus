<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Admin Sensus RT 04 (Light)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        :root {
            --bg-app: #F8FAFC; --card-bg: #FFFFFF; --bg-input: #F1F5F9; --border: #E2E8F0;
            --primary: #FF6B35; --primary-light: rgba(255, 107, 53, 0.08);
            --teal: #0D9488; --teal-light: rgba(13, 148, 136, 0.08);
            --accent-warn: #EF4444; --accent-warn-light: rgba(239, 68, 68, 0.08);
            --text-main: #0F172A; --text-muted: #64748B;
            --radius-lg: 12px; --radius-md: 8px; --transition: all 0.2s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-app); color: var(--text-main); padding: 10px; font-size: 0.75rem; }
        
        .admin-container { max-width: 650px; margin: 0 auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 10px 14px; border-radius: var(--radius-lg); border: 1px solid var(--border); margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.01); }
        .header-title h1 { font-size: 1rem; font-weight: 800; }
        .stats-wrapper { display: flex; gap: 6px; }
        .stat-badge { background: var(--bg-input); padding: 4px 8px; border-radius: var(--radius-md); font-size: 0.7rem; font-weight: 700; }

        .filter-card { background: var(--card-bg); border-radius: var(--radius-lg); padding: 10px; border: 1px solid var(--border); margin-bottom: 10px; display: flex; gap: 6px; }
        .search-box { flex: 1; position: relative; }
        .search-box i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-box .form-control { padding-left: 28px; }
        .form-control { width: 100%; padding: 6px 10px; border: 1.5px solid var(--border); border-radius: var(--radius-md); font-size: 0.75rem; background: var(--bg-app); outline: none; color: var(--text-main); }
        .filter-select { width: 100px; }

        .table-card { background: var(--card-bg); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.01); }
        .admin-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.75rem; }
        .admin-table th, .admin-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
        .admin-table th { background: #F1F5F9; color: var(--text-muted); }

        .code-link { color: var(--primary); font-weight: 800; cursor: pointer; text-decoration: underline; }
        .status-badge { padding: 2px 4px; border-radius: 4px; font-size: 0.65rem; font-weight: 700; }
        .status-pending { background: var(--primary-light); color: var(--primary); }
        .status-approved { background: var(--teal-light); color: var(--teal); }

        .btn-table { padding: 4px 8px; border: none; border-radius: 4px; font-size: 0.7rem; font-weight: 700; cursor: pointer; }
        .btn-approve { background: var(--teal); color: white; width: 100%; margin-top: 10px; padding: 8px; border-radius: 6px; }
        .btn-delete { background: var(--accent-warn-light); color: var(--accent-warn); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.2); backdrop-filter: blur(4px); z-index: 9999; justify-content: center; align-items: center; padding: 10px; }
        .modal-box { background: #fff; border-radius: var(--radius-lg); padding: 14px; max-width: 440px; width: 100%; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 10px; }
        
        .info-row { display: flex; flex-direction: column; margin-bottom: 6px; }
        .info-row label { font-size: 0.6rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .info-row p { font-size: 0.75rem; font-weight: 600; background: var(--bg-app); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); }

        .warga-popup-card { background: var(--bg-app); border: 1px solid var(--border); padding: 8px; border-radius: var(--radius-md); margin-bottom: 6px; }
        .warga-popup-card .card-head { display: flex; justify-content: space-between; font-weight: 700; color: var(--primary); margin-bottom: 2px;}
        .warga-popup-card p { font-size: 0.7rem; color: var(--text-main); margin-bottom: 1px; }

        .ktp-link-click { color: var(--teal); text-decoration: underline; cursor: pointer; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; margin-top: 2px;}
        .ktp-simulated-box { background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%); color: white; padding: 15px; border-radius: 10px; text-align: left; position: relative; overflow: hidden; box-shadow: 0 4px 14px rgba(37,99,235,0.25); font-family: monospace; }
    </style>
</head>
<body>

    <div class="admin-container">
        <header class="admin-header">
            <div class="header-title"><h1>Panel Sensus RT 04</h1><p>Klik kode untuk detail data komplit</p></div>
            <div class="stats-wrapper">
                <div class="stat-badge" style="color:var(--primary);">P: <span id="statPending">0</span></div>
                <div class="stat-badge" style="color:var(--teal);">S: <span id="statApproved">0</span></div>
            </div>
        </header>

        <section class="filter-card">
            <div class="search-box"><i class="fas fa-magnifying-glass"></i><input type="text" id="adminSearchInput" class="form-control" placeholder="Cari data..." oninput="renderTabelAdmin()"></div>
            <select id="filterStatusSelect" class="form-control filter-select" onchange="renderTabelAdmin()"><option value="Semua">Semua</option><option value="Pending">Pending</option><option value="Approved">Sah</option></select>
        </section>

        <main class="table-card">
            <table class="admin-table">
                <thead><tr><th>Kode</th><th>No. Rmh</th><th>Jiwa</th><th>Status</th><th>Aksi</th></tr></thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </main>
    </div>

    <!-- MODAL 1: DETAIL POP-UP WARGA (LENGKAP) -->
    <div id="detailModal" class="modal-overlay" onclick="if(event.target == this) tutupDetailModal()">
        <div class="modal-box">
            <div class="modal-header"><h3><i class="fas fa-folder-open" style="color:var(--primary)"></i> Berkas Kependudukan</h3><button style="background:none; border:none; font-size:1.2rem; cursor:pointer;" onclick="tutupDetailModal()">&times;</button></div>
            <div id="modalDetailContent").innerHTML = ""></div>
        </div>
    </div>

    <!-- MODAL 2: PREVIEW SIMULASI FOTO KTP -->
    <div id="ktpModal" class="modal-overlay" onclick="if(event.target == this) tutupKtpModal()">
        <div class="modal-box" style="max-width: 380px; background: #fff; border: 1px solid var(--border);">
            <div class="modal-header" style="border-bottom-color: var(--border);"><h3><i class="fas fa-id-card" style="color:var(--teal)"></i> Dokumen Terlampir</h3><button style="background:none; border:none; font-size:1.2rem; cursor:pointer;" onclick="tutupKtpModal()">&times;</button></div>
            <div id="ktpModalContent"></div>
        </div>
    </div>

    <!-- MODAL 3: HAPUS -->
    <div id="deleteModal" class="modal-overlay" onclick="if(event.target == this) tutupDeleteModal()">
        <div class="modal-box" style="max-width: 280px; text-align: center;">
            <h3 style="font-size:0.9rem;">Hapus Permanen?</h3>
            <div style="display:flex; gap:6px; justify-content:center; margin-top:12px;">
                <button class="btn-table btn-delete" id="btnConfirmDelete">Hapus</button>
                <button class="btn-table" style="background:var(--bg-input)" onclick="tutupDeleteModal()">Batal</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZ31_bLqBiHY6VqHSza2qMuZqesp9-Cgg",
            authDomain: "sensus04.firebaseapp.com",
            databaseURL: "https://sensus04-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sensus04",
            storageBucket: "sensus04.firebasestorage.app",
            messagingSenderId: "538090009079",
            appId: "1:538090009079:web:932a4a812dd6de5fabfef2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const sensusRef = db.ref('sensus_warga');

        let dataSensusMaster = {}; let targetDeleteKey = null;

        sensusRef.on('value', (snapshot) => {
            if(snapshot.exists()) { dataSensusMaster = snapshot.val(); hitungDanUpdateStats(); renderTabelAdmin(); }
            else { dataSensusMaster = {}; renderTabelAdmin(); hitungDanUpdateStats(); }
        });

        function hitungDanUpdateStats() {
            let p = 0; let a = 0;
            Object.keys(dataSensusMaster).forEach(k => { if(dataSensusMaster[k].status === "Pending") p++; else a++; });
            document.getElementById("statPending").innerText = p; document.getElementById("statApproved").innerText = a;
        }

        function renderTabelAdmin() {
            const tbody = document.getElementById("adminTableBody");
            const kw = document.getElementById("adminSearchInput").value.trim().toLowerCase();
            const filter = document.getElementById("filterStatusSelect").value;
            tbody.innerHTML = "";

            Object.keys(dataSensusMaster).forEach(key => {
                const item = dataSensusMaster[key];
                if(filter === "Pending" && item.status !== "Pending") return;
                if(filter === "Approved" && item.status !== "Approved") return;

                if(kw !== "" && !item.kode.toLowerCase().includes(kw) && !item.noRumah.toLowerCase().includes(kw) && !(item.anggota && item.anggota.some(w => w.nama.toLowerCase().includes(kw)))) return;

                tbody.innerHTML += `
                    <tr>
                        <td><span class="code-link" onclick="bukaDetailModal('${item.kode}')">${item.kode}</span></td>
                        <td style="font-weight:600;">No. ${item.noRumah}</td>
                        <td><b>${item.jumlahJiwa}</b> Jiwa</td>
                        <td><span class="status-badge ${item.status === 'Pending' ? 'status-pending' : 'status-approved'}">${item.status === 'Pending' ? 'Pending' : 'Sah'}</span></td>
                        <td><button class="btn-table btn-delete" onclick="bukaDeleteModal('${item.kode}')"><i class="fas fa-trash"></i></button></td>
                    </tr>`;
            });
        }

        function bukaDetailModal(kode) {
            const data = dataSensusMaster[kode]; if(!data) return;
            let listWargaHtml = "";

            if(data.anggota && Array.isArray(data.anggota)) {
                data.anggota.forEach((w, index) => {
                    listWargaHtml += `
                        <div class="warga-popup-card">
                            <div class="card-head"><span>${w.nama}</span><span class="badge-status-warga">${w.status}</span></div>
                            <p><b>NIK:</b> <code>${w.nik}</code></p>
                            <p><b>TTL:</b> ${w.tempatLahir || '-'}, ${w.tanggalLahir || '-'}</p>
                            <p><b>Gend / Agama:</b> ${w.jk || '-'} / ${w.agama || '-'}</p>
                            <p><b>Pekerjaan:</b> ${w.pekerjaan || '-'}</p>
                            ${w.fileUploaded !== "Tidak Perlu" ? `<div class="ktp-link-click" onclick="bukaKtpModal('${w.nama}', '${w.nik}', '${w.fileUploaded}')"><i class="fas fa-image"></i> Lihat KTP (${w.fileUploaded})</div>` : ''}
                        </div>`;
                });
            }

            document.getElementById("modalDetailContent").innerHTML = `
                <div class="info-row"><label>Status Hunian</label><p style="color:var(--primary); font-weight:700;">${data.statusRumah}</p></div>
                <div class="info-row"><label>Detail Alamat</label><p>Rumah No. ${data.noRumah} - ${data.alamat}</p></div>
                <div class="info-row"><label>WhatsApp</label><p><a href="https://wa.me/${data.waUtama}" target="_blank" style="color:inherit; text-decoration:none;"><i class="fab fa-whatsapp" style="color:#25D366"></i> ${data.waUtama}</a></p></div>
                <div style="margin:8px 0 4px 0; font-weight:700; color:var(--text-muted); text-transform:uppercase; font-size:0.65rem;">Daftar Jiwa Sensus:</div>
                <div style="max-height:240px; overflow-y:auto;">${listWargaHtml}</div>
                ${data.status === "Pending" ? `<button class="btn-table btn-approve" onclick="setujuiBerkas('${data.kode}')"><i class="fas fa-check"></i> Sahkan & Setujui</button>` : '<div style="margin-top:10px; background:var(--teal-light); color:var(--teal); text-align:center; padding:6px; border-radius:4px; font-weight:700;">✓ Berkas Telah Disetujui</div>'}
            `;
            document.getElementById("detailModal").style.display = "flex";
        }

        function bukaKtpModal(nama, nik, filename) {
            document.getElementById("ktpModalContent").innerHTML = `
                <div class="ktp-simulated-box">
                    <div style="font-size:0.65rem; font-weight:700; text-align:center; margin-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.3); padding-bottom:4px;">PROVINSI REPUBLIK INDONESIA</div>
                    <div style="font-size:0.8rem; font-weight:700; margin-bottom:5px;">NIK: ${nik}</div>
                    <div style="font-size:0.7rem; line-height:1.3;">
                        Nama &nbsp; &nbsp; &nbsp; &nbsp;: ${nama.toUpperCase()}<br>
                        Status &nbsp; &nbsp;  : WARGA RT 04<br>
                        Lampiran &nbsp;  : ${filename}<br>
                        Dokumen &nbsp; &nbsp;: ASLI / VALID
                    </div>
                    <div style="position:absolute; right:12px; bottom:12px; width:45px; height:55px; border:1px solid rgba(255,255,255,0.4); display:flex; align-items:center; justify-content:center; font-size:0.5rem; background:rgba(255,255,255,0.1);">FOTO KTP</div>
                </div>`;
            document.getElementById("ktpModal").style.display = "flex";
        }

        function tutupDetailModal() { document.getElementById("detailModal").style.display = "none"; }
        function tutupKtpModal() { document.getElementById("ktpModal").style.display = "none"; }
        function setujuiBerkas(kode) { sensusRef.child(kode).update({ status: "Approved" })[span_1](start_span)[span_1](end_span).then(() => tutupDetailModal()); }
        function bukaDeleteModal(kode) { targetDeleteKey = kode; document.getElementById("deleteModal").style.display = "flex"; }
        function tutupDeleteModal() { document.getElementById("deleteModal").style.display = "none"; }

        document.getElementById("btnConfirmDelete").addEventListener("click", function() {
            if(targetDeleteKey) { sensusRef.child(targetDeleteKey).remove().then(() => tutupDeleteModal()); }
        });
    </script>
</body>
</html>
