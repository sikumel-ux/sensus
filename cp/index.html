<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin Premium - Sensus RT 04 Digital</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <link rel="stylesheet" href="gaya.css">
</head>
<body>

    <nav class="admin-nav">
        <div class="admin-brand">
            <div class="brand-icon"><i class="fas fa-shield-halved"></i></div>
            <span>PANEL PENGURUS RT 04</span>
        </div>
        <div class="nav-status-badge">
            <span class="pulse-dot"></span> Real-time Cloud
        </div>
    </nav>

    <div class="app-container">
        
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-icon-wrapper"><i class="fas fa-folder-open"></i></div>
                <div class="stat-info">
                    <h4>Total Berkas</h4>
                    <div class="stat-num" id="statTotal">0</div>
                </div>
            </div>
            <div class="stat-box status-amber">
                <div class="stat-icon-wrapper"><i class="fas fa-clock"></i></div>
                <div class="stat-info">
                    <h4>Berkas Pending</h4>
                    <div class="stat-num" id="statPending">0</div>
                </div>
            </div>
            <div class="stat-box status-emerald">
                <div class="stat-icon-wrapper"><i class="fas fa-circle-check"></i></div>
                <div class="stat-info">
                    <h4>Disahkan (Approved)</h4>
                    <div class="stat-num" id="statApproved">0</div>
                </div>
            </div>
        </div>

        <div class="app-card">
            <div class="card-header-group">
                <div class="header-text">
                    <h3>Daftar Masuk Sensus Warga</h3>
                    <p>Klik pada baris tabel untuk memvalidasi berkas kependudukan.</p>
                </div>
            </div>

            <div class="table-responsive">
                <table class="app-table">
                    <thead>
                        <tr>
                            <th>KODE</th>
                            <th>NO. RUMAH</th>
                            <th>STATUS HUNIAN</th>
                            <th>JUMLAH JIWA</th>
                            <th>STATUS VERIFIKASI</th>
                        </tr>
                    </thead>
                    <tbody id="tabelAdminSensus">
                        <tr>
                            <td colspan="5" class="table-loading">
                                <i class="fas fa-circle-notch fa-spin"></i> Menghubungkan ke Firebase Cloud...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="customAlertOverlay" class="custom-alert-overlay">
        <div class="modal-detail-box" id="alertBoxContent"></div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
