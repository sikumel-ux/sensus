<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terima Kasih - Sensus RT 04</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        :root {
            --bg-admin: #0F172A;
            --bg-content: #F8FAFC;
            --card-bg: #FFFFFF;
            --border: #CBD5E1;
            --primary: #FF6B35;
            --primary-gradient: linear-gradient(135deg, #E0531F 0%, #FF6B35 60%);
            --teal: #0D9488;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-content); color: var(--text-main); font-size: 0.9rem; line-height: 1.6; }

        .wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .thank-card { background: var(--card-bg); max-width: 600px; width: 100%; padding: 40px 30px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); text-align: center; }

        .success-icon { width: 80px; height: 80px; background: #DCFCE7; color: #16A34A; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 24px; }
        
        h1 { font-size: 1.8rem; font-weight: 800; color: var(--bg-admin); margin-bottom: 8px; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 30px; }

        .data-box { text-align: left; background: #F1F5F9; border-radius: 12px; padding: 20px; margin-bottom: 30px; border: 1px solid #E2E8F0; }
        .data-box h3 { font-size: 1rem; font-weight: 700; margin-bottom: 14px; border-bottom: 1px solid var(--border); padding-bottom: 8px; color: var(--bg-admin); display: flex; align-items: center; gap: 8px; }
        
        .warga-review-item { background: #ffffff; border: 1px solid #E2E8F0; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
        .data-row { display: grid; grid-template-columns: 140px 10px 1fr; padding: 4px 0; font-size: 0.85rem; }
        .data-label { font-weight: 600; color: var(--text-muted); }
        .data-value { font-weight: 700; color: var(--text-main); }

        .btn-back { display: inline-flex; align-items: center; gap: 8px; background: var(--primary-gradient); color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 0.9rem; box-shadow: 0 4px 12px rgba(224, 83, 31, 0.2); transition: all 0.2s; cursor: pointer; border: none; }
        .btn-back:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(224, 83, 31, 0.3); }
        
        .reg-code-box { background: rgba(255, 107, 53, 0.08); border: 2px dashed var(--primary); padding: 12px; font-size: 1.5rem; font-weight: 800; color: var(--primary); letter-spacing: 1px; border-radius: 8px; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="thank-card">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>Data Berhasil Dikirim!</h1>
            <p class="subtitle">Matur nuwun, data sensus Anda telah tersimpan di database RT 04 dengan no registrasi:</p>

            <div class="reg-code-box" id="displayKodeReg">04-XXXXXX</div>

            <div id="ringkasanData" class="data-box">
                <h3><i class="fas fa-home"></i> Informasi Hunian</h3>
                
                <div class="data-row">
                    <div class="data-label">Status Hunian</div><div>:</div><div class="data-value" id="res_status">-</div>
                </div>
                <div class="data-row">
                    <div class="data-label">No. Kartu Keluarga</div><div>:</div><div class="data-value" id="res_kk">-</div>
                </div>
                <div class="data-row">
                    <div class="data-label">No. Rumah</div><div>:</div><div class="data-value" id="res_rumah">-</div>
                </div>
                <div class="data-row">
                    <div class="data-label">No WhatsApp</div><div>:</div><div class="data-value" id="res_wa">-</div>
                </div>
                <div class="data-row">
                    <div class="data-label">Alamat Detail</div><div>:</div><div class="data-value" id="res_alamat">-</div>
                </div>

                <h3 style="margin-top: 20px; margin-bottom: 10px;"><i class="fas fa-users"></i> Daftar Anggota Jiwa Terdaftar</h3>
                <div id="containerDaftarWarga"></div>
            </div>

            <button onclick="kembaliKeFormUtama()" class="btn-back">
                <i class="fas fa-home"></i> Kembali ke Halaman Utama
            </button>
        </div>
    </div>

    <script>
        function muatRingkasanDariLocalStorage() {
            // 1. Tangkap Kode Registrasi dari parameter URL
            const urlParams = new URLSearchParams(window.location.search);
            const kodeReg = urlParams.get('id');
            if (kodeReg) {
                document.getElementById("displayKodeReg").innerText = kodeReg;
            }

            // 2. Ambil data kiriman dari localStorage browser
            const localDataRaw = localStorage.getItem('sensus_terakhir');

            if (localDataRaw) {
                try {
                    const dataSensus = JSON.parse(localDataRaw);

                    // Pasang ringkasan properti rumah
                    document.getElementById("res_status").innerText = dataSensus.statusRumah || "-";
                    document.getElementById("res_kk").innerText = dataSensus.noKk || "-";
                    document.getElementById("res_rumah").innerText = dataSensus.noRumah || "-";
                    document.getElementById("res_wa").innerText = dataSensus.waUtama || "-";
                    document.getElementById("res_alamat").innerText = dataSensus.alamat || "-";

                    // Susun data per-warga / anggota keluarga secara berulang
                    const containerWarga = document.getElementById("containerDaftarWarga");
                    containerWarga.innerHTML = "";

                    if (dataSensus.anggota && dataSensus.anggota.length > 0) {
                        dataSensus.anggota.forEach((warga, idx) => {
                            const itemHtml = `
                                <div class="warga-review-item">
                                    <div style="font-weight: 800; color: var(--primary); font-size: 0.85rem; margin-bottom: 4px;">
                                        #${idx + 1} ${warga.nama} (${warga.hubungan})
                                    </div>
                                    <div class="data-row">
                                        <div class="data-label">NIK</div><div>:</div><div class="data-value">${warga.nik}</div>
                                    </div>
                                    <div class="data-row">
                                        <div class="data-label">Pekerjaan</div><div>:</div><div class="data-value">${warga.pekerjaan || "-"}</div>
                                    </div>
                                </div>
                            `;
                            containerWarga.insertAdjacentHTML('beforeend', itemHtml);
                        });
                    } else {
                        containerWarga.innerHTML = "<p style='color:var(--text-muted); font-size:0.8rem;'>Tidak ada data anggota keluarga.</p>";
                    }

                } catch (e) {
                    console.error("Gagal membaca struktur JSON:", e);
                    TampilkanPesanSistemKosong();
                }
            } else {
                TampilkanPesanSistemKosong();
            }
        }

        function TampilkanPesanSistemKosong() {
            document.getElementById("ringkasanData").innerHTML = `
                <p style='color:var(--text-muted); font-size:0.85rem; text-align:center; padding: 20px 0;'>
                    Ringkasan data telah dibersihkan demi keamanan browser. Bukti simpan Anda sah menggunakan Kode Registrasi di atas.
                </p>
            `;
        }

        function kembaliKeFormUtama() {
            localStorage.removeItem('sensus_terakhir');
            window.location.href = "../";
        }

        window.onload = muatRingkasanDariLocalStorage;
    </script>
</body>
</html>
